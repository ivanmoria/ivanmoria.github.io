<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Lab - Real Sum & Chord Buttons</title>
    <style>
        :root {
            --bg: #0b0b0e;
            --panel: #16161d;
            --accent: #00f2ff;
            --text: #d1d1d1;
            --power-on: #00ff88;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .top-toolbar {
            background: var(--panel); padding: 15px 25px; border-radius: 12px;
            margin-bottom: 25px; display: flex; flex-direction: row;
            align-items: center; justify-content: space-between; gap: 15px;
            width: 100%; max-width: 1250px; border: 1px solid #333;
        }

        .piano-section { display: flex; align-items: center; gap: 15px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .octave-selector { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .oct-btn { background: #252530; color: var(--accent); border: 1px solid #444; width: 30px; height: 30px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .oct-display { font-family: monospace; font-size: 0.7rem; color: #888; }

        .keyboard { display: flex; position: relative; height: 70px; }
        .key { width: 28px; height: 100%; border: 1px solid #000; cursor: pointer; transition: 0.1s; border-radius: 0 0 3px 3px; }
        .white { background: #eee; z-index: 1; }
        .white.active { background: var(--accent); box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2); }
        .black { background: #222; width: 18px; height: 42px; margin-left: -9px; margin-right: -9px; z-index: 2; border-radius: 0 0 2px 2px; }
        .black.active { background: #0088aa; box-shadow: 0 0 10px var(--accent); }

        .power-container { text-align: center; cursor: pointer; min-width: 50px; }
        .power-knob { width: 35px; height: 35px; background: radial-gradient(circle, #333, #111); border-radius: 50%; border: 2px solid #444; position: relative; transition: 0.4s; }
        .power-active .power-knob { border-color: var(--power-on); box-shadow: 0 0 10px var(--power-on); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 1250px; }
        .card { background: var(--panel); padding: 15px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--osc-color); }
        
        .slider-container { padding: 10px 0; }
        .freq-slider { appearance: none; -webkit-appearance: none; width: 100%; height: 6px; background: #333; border-radius: 5px; outline: none; }
        .freq-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--osc-color); border-radius: 50%; cursor: pointer; }

        .light-switch { width: 40px; height: 15px; background: #111; border: 1px solid #333; border-radius: 10px; margin: 10px auto; cursor: pointer; }
        .light-switch.on { background: var(--osc-color); box-shadow: 0 0 15px var(--osc-color); border-color: #fff; }
        
        .freq-display { font-family: monospace; font-size: 0.9rem; color: var(--osc-color); margin: 5px 0; font-weight: bold; }
        canvas { background: #000; width: 100%; height: 60px; border-radius: 4px; border: 1px solid #222; }
        
        #sum-canvas { height: 400px; margin-top: 20px; max-width: 1250px; width: 100%; border: 1px solid #333; border-radius: 10px; background: #000; cursor: crosshair; }
        
        .sync-btn { background: #252530; color: #fff; border: 1px solid #ffcc00; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .chord-btn { background: #252530; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; min-width: 55px; }
        .chord-btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="top-toolbar">
        <div class="power-container" onclick="togglePower()" id="power-wrapper">
            <div class="power-knob"></div>
            <label style="display:block; font-size:0.5rem; margin-top:5px; color:#666;">POWER</label>
        </div>

        <div class="piano-section">
            <div class="octave-selector">
                <button class="oct-btn" onclick="changeOctave(1)">+</button>
                <div class="oct-display">OCT: <span id="oct-val">0</span></div>
                <button class="oct-btn" onclick="changeOctave(-1)">-</button>
            </div>
            <div class="keyboard" id="keyboard"></div>
            <div id="piano-note-name" style="font-family: monospace; color: var(--accent); font-size: 0.8rem; width: 85px; text-align: center;">C4</div>
        </div>

        <button class="sync-btn" onclick="resetPhases()">RESET PHASE (SYNC)</button>

        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="font-size: 0.6rem; color: #888;">TIMEBASE (ZOOM):</div>
            <input type="range" id="zoom-slider" min="5" max="200" value="50" style="width: 80px;">
            
            <select id="speed-select" style="background:#252530; color:var(--accent); border:1px solid #444; padding:5px; border-radius:4px; font-size:0.7rem;">
                <option value="0">PAUSADO</option>
                <option value="0.0001">LENTO</option>
                <option value="0.0005" selected>NORMAL</option>
            </select>

            <div class="chord-group" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;">
                <button class="chord-btn" onclick="applyChord('maior')">MAIOR</button>
                <button class="chord-btn" onclick="applyChord('menor')">MENOR</button>
                <button class="chord-btn" onclick="applyChord('m7')">m7</button>
                <button class="chord-btn" onclick="applyChord('maj7')">7M</button>
                <button class="chord-btn" onclick="applyChord('7')">7</button>
                <button class="chord-btn" onclick="applyChord('m7b5')">m7b5</button>
            </div>
        </div>
    </div>

    <div class="grid" id="osc-container"></div>
    <canvas id="sum-canvas"></canvas>

    <script>
        const colors = ['#00f2ff', '#33ff77', '#ffcc00', '#ff3366'];
        const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const chordIntervals = {
            'maior': [0, 4, 7, 12], 'menor': [0, 3, 7, 12],
            'm7': [0, 3, 7, 10], 'maj7': [0, 4, 7, 11], 
            '7': [0, 4, 7, 10], 'm7b5': [0, 3, 6, 10]
        };

        let currentOctave = 0, selectedNoteIndex = 0;
        let audioCtx = null, oscillators = [], speedFactor = 0.0005, isPowerOn = false;
        let timeOffset = 0;
        let isHoveringSum = false;

        // Listener para o hover no canvas de soma
        const sumCanvas = document.getElementById('sum-canvas');
        const sumCtx = sumCanvas.getContext('2d');
        sumCanvas.addEventListener('mouseenter', () => isHoveringSum = true);
        sumCanvas.addEventListener('mouseleave', () => isHoveringSum = false);

        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
                const key = document.createElement('div');
                key.className = `key ${isBlack ? 'black' : 'white'}`;
                if (i === selectedNoteIndex) key.classList.add('active');
                key.onclick = () => { 
                    selectedNoteIndex = i; 
                    updatePianoUI();
                    if (!isPowerOn) togglePower();
                    applyChord('maior'); 
                };
                keyboard.appendChild(key);
            }
        }

        function changeOctave(delta) {
            currentOctave = Math.max(-2, Math.min(2, currentOctave + delta));
            document.getElementById('oct-val').textContent = currentOctave;
            updatePianoUI();
        }

        function updatePianoUI() {
            document.querySelectorAll('.key').forEach((k, idx) => k.classList.toggle('active', idx === selectedNoteIndex));
            const midi = 60 + (currentOctave * 12) + selectedNoteIndex;
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            document.getElementById('piano-note-name').textContent = `${noteNames[selectedNoteIndex]}${Math.floor(midi / 12) - 1} (${freq.toFixed(1)}Hz)`;
        }

        const oscContainer = document.getElementById('osc-container');
        for (let i = 0; i < 4; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.setProperty('--osc-color', colors[i]);
            card.innerHTML = `
                <div style="font-size:0.6rem; color:#555" id="note-name-${i}">-</div>
                <div class="light-switch" id="switch-${i}" onclick="toggleOsc(${i})"></div>
                <div class="slider-container">
                    <input type="range" class="freq-slider" id="slider-${i}" min="20" max="4000" value="261" oninput="updateFreqFromSlider(${i}, this.value)">
                </div>
                <div class="freq-display" id="freq-text-${i}">261 Hz</div>
                <canvas id="canvas-${i}"></canvas>`;
            oscContainer.appendChild(card);
            oscillators.push({ 
                freq: 261, active: false,
                canvas: document.getElementById(`canvas-${i}`), 
                ctx: document.getElementById(`canvas-${i}`).getContext('2d'), 
                color: colors[i], node: null
            });
        }

        function updateFreqFromSlider(i, val) {
            const osc = oscillators[i];
            osc.freq = parseFloat(val);
            document.getElementById(`freq-text-${i}`).textContent = `${osc.freq} Hz`;
            const n = Math.round(12 * Math.log2(osc.freq / 440) + 69);
            document.getElementById(`note-name-${i}`).textContent = (noteNames[n % 12] || "") + (Math.floor(n/12)-1);
            if (osc.node && isPowerOn) osc.node.frequency.setTargetAtTime(osc.freq, audioCtx.currentTime, 0.05);
        }

        function togglePower() {
            isPowerOn = !isPowerOn;
            document.getElementById('power-wrapper').classList.toggle('power-active');
            if (isPowerOn) {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                oscillators.forEach((osc, i) => { if(osc.active) startAudio(i); });
            } else { oscillators.forEach((_, i) => stopAudio(i)); }
        }

        function toggleOsc(i) {
            oscillators[i].active = !oscillators[i].active;
            document.getElementById(`switch-${i}`).classList.toggle('on');
            if (isPowerOn) oscillators[i].active ? startAudio(i) : stopAudio(i);
        }

        function startAudio(i) {
            const osc = oscillators[i];
            if (!osc.node && audioCtx) {
                osc.node = audioCtx.createOscillator();
                osc.gain = audioCtx.createGain();
                osc.node.frequency.value = osc.freq;
                osc.gain.gain.value = 0.1;
                osc.node.connect(osc.gain).connect(audioCtx.destination);
                osc.node.start();
            }
        }

        function stopAudio(i) {
            if (oscillators[i].node) {
                try { oscillators[i].node.stop(); oscillators[i].node.disconnect(); } catch(e){}
                oscillators[i].node = null;
            }
        }

        function applyChord(type) {
            const midi = 60 + (currentOctave * 12) + selectedNoteIndex;
            const rootFreq = 440 * Math.pow(2, (midi - 69) / 12);
            chordIntervals[type].forEach((semi, i) => {
                const f = Math.round(rootFreq * Math.pow(2, semi / 12) * 10) / 10;
                document.getElementById(`slider-${i}`).value = f;
                updateFreqFromSlider(i, f);
                oscillators[i].active = true;
                document.getElementById(`switch-${i}`).classList.add('on');
                if (isPowerOn) { stopAudio(i); startAudio(i); }
            });
            resetPhases();
        }

        function resetPhases() { timeOffset = 0; }

        function animate() {
            sumCtx.clearRect(0, 0, sumCanvas.width, sumCanvas.height);
            const midY = sumCanvas.height / 2;
            const z = document.getElementById('zoom-slider').value / 500000;

            oscillators.forEach((osc) => {
                osc.ctx.clearRect(0, 0, osc.canvas.width, osc.canvas.height);
                if (osc.active) {
                    // Gráfico pequeno (sempre nítido)
                    osc.ctx.beginPath(); osc.ctx.strokeStyle = osc.color; osc.ctx.lineWidth = 2;
                    for (let x = 0; x < osc.canvas.width; x++) {
                        const t = (timeOffset + x) * z;
                        const y = Math.sin(2 * Math.PI * osc.freq * t) * 20 + 30;
                        x === 0 ? osc.ctx.moveTo(x, y) : osc.ctx.lineTo(x, y);
                    }
                    osc.ctx.stroke();

                    // Representação no gráfico somado (fica mais leve no hover)
                    sumCtx.globalAlpha = isHoveringSum ? 0.2 : 0.6;
                    sumCtx.beginPath(); sumCtx.strokeStyle = osc.color; sumCtx.lineWidth = 2;
                    for (let x = 0; x < sumCanvas.width; x++) {
                        const t = (timeOffset + x) * z;
                        const y = Math.sin(2 * Math.PI * osc.freq * t) * 40 + midY;
                        x === 0 ? sumCtx.moveTo(x, y) : sumCtx.lineTo(x, y);
                    }
                    sumCtx.stroke();
                    sumCtx.globalAlpha = 1.0;
                }
            });

            // SOMA MATEMÁTICA REAL (Linha Branca)
            let actives = oscillators.filter(o => o.active);
            if (actives.length > 0) {
                sumCtx.beginPath(); 
                sumCtx.strokeStyle = '#fff'; 
                sumCtx.lineWidth = isHoveringSum ? 5 : 3;
                
                // Brilho intenso no hover, brilho suave por padrão
                sumCtx.shadowBlur = isHoveringSum ? 25 : 10;
                sumCtx.shadowColor = isHoveringSum ? '#fff' : 'rgba(255, 255, 255, 0.4)';
                
                for (let x = 0; x < sumCanvas.width; x++) {
                    let totalAmp = 0;
                    actives.forEach(osc => {
                        const t = (timeOffset + x) * z;
                        totalAmp += Math.sin(2 * Math.PI * osc.freq * t);
                    });
                    const py = (totalAmp * 40) + midY;
                    x === 0 ? sumCtx.moveTo(x, py) : sumCtx.lineTo(x, py);
                }
                sumCtx.stroke();
                sumCtx.shadowBlur = 0; // Reseta para não afetar outros draws
            }

            timeOffset += speedFactor * 10000;
            requestAnimationFrame(animate);
        }

        document.getElementById('speed-select').onchange = (e) => speedFactor = parseFloat(e.target.value);
        createKeyboard();
        window.addEventListener('resize', () => {
            sumCanvas.width = sumCanvas.clientWidth; sumCanvas.height = sumCanvas.clientHeight;
            oscillators.forEach(o => { o.canvas.width = o.canvas.clientWidth; o.canvas.height = o.canvas.clientHeight; });
        });
        window.dispatchEvent(new Event('resize'));
        animate();
    </script>
</body>
</html>
