<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Lab - Octave Shift</title>
    <style>
        :root {
            --bg: #0b0b0e;
            --panel: #16161d;
            --accent: #00f2ff;
            --text: #d1d1d1;
            --power-on: #00ff88;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .top-toolbar {
            background: var(--panel); padding: 15px 25px; border-radius: 12px;
            margin-bottom: 25px; display: flex; flex-direction: row;
            align-items: center; justify-content: space-between; gap: 15px;
            width: 100%; max-width: 1250px; border: 1px solid #333;
        }

        /* Container do Teclado e Oitava */
        .piano-section { display: flex; align-items: center; gap: 15px; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        
        .octave-selector { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .oct-btn { 
            background: #252530; color: var(--accent); border: 1px solid #444; 
            width: 30px; height: 30px; cursor: pointer; font-weight: bold; border-radius: 4px;
        }
        .oct-btn:hover { background: #333; }
        .oct-display { font-family: monospace; font-size: 0.7rem; color: #888; }

        .keyboard { display: flex; position: relative; height: 70px; }
        .key { width: 28px; height: 100%; border: 1px solid #000; cursor: pointer; transition: 0.1s; border-radius: 0 0 3px 3px; }
        .white { background: #eee; z-index: 1; }
        .white.active { background: var(--accent); box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2); }
        .black { background: #222; width: 18px; height: 42px; margin-left: -9px; margin-right: -9px; z-index: 2; border-radius: 0 0 2px 2px; }
        .black.active { background: #0088aa; box-shadow: 0 0 10px var(--accent); }

        /* Master Power Knob */
        .power-container { text-align: center; cursor: pointer; min-width: 50px; }
        .power-knob { width: 35px; height: 35px; background: radial-gradient(circle, #333, #111); border-radius: 50%; border: 2px solid #444; position: relative; transition: 0.4s; }
        .power-knob::after { content: ''; position: absolute; top: 5px; left: 50%; width: 3px; height: 10px; background: #444; transform: translateX(-50%); border-radius: 2px; }
        .power-active .power-knob { transform: rotate(45deg); border-color: var(--power-on); }
        .power-active .power-knob::after { background: var(--power-on); box-shadow: 0 0 10px var(--power-on); }

        /* Grid de Canais */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 1250px; }
        .card { background: var(--panel); padding: 12px; border-radius: 12px; text-align: center; border-bottom: 3px solid var(--osc-color); }
        .light-switch { width: 35px; height: 12px; background: #111; border: 1px solid #333; border-radius: 6px; margin: 8px auto; cursor: pointer; }
        .light-switch.on { background: var(--osc-color); box-shadow: 0 0 10px var(--osc-color); border-color: #fff; }
        .knob-container { position: relative; width: 55px; height: 55px; margin: 5px auto; }
        .knob { width: 100%; height: 100%; background: radial-gradient(circle, #333, #111); border-radius: 50%; border: 2px solid #444; cursor: ns-resize; }
        .knob::after { content: ''; position: absolute; top: 5px; left: 50%; width: 3px; height: 8px; background: var(--osc-color); transform: translateX(-50%); }
        .freq-display { font-family: monospace; font-size: 0.8rem; color: var(--osc-color); margin: 5px 0; }
        canvas { background: #000; width: 100%; height: 60px; border-radius: 4px; }
        #sum-canvas { height: 260px; margin-top: 20px; max-width: 1250px; width: 100%; border: 1px solid #222; border-radius: 10px; }
        
        .chord-group { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; width: 250px; }
        .chord-btn { background: #252530; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; min-width: 55px; }
        .chord-btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="top-toolbar">
        <div class="power-container" onclick="togglePower()" id="power-wrapper">
            <div class="power-knob"></div>
            <label style="display:block; font-size:0.5rem; margin-top:5px; color:#666;">POWER</label>
        </div>

        <div class="piano-section">
            <div class="octave-selector">
                <button class="oct-btn" onclick="changeOctave(1)">+</button>
                <div class="oct-display">OCT: <span id="oct-val">0</span></div>
                <button class="oct-btn" onclick="changeOctave(-1)">-</button>
            </div>
            <div class="keyboard" id="keyboard"></div>
            <div id="piano-note-name" style="font-family: monospace; color: var(--accent); font-size: 0.8rem; width: 80px; text-align: center;">C4</div>
        </div>

        <div style="display: flex; align-items: center; gap: 15px;">
            <select id="speed-select" style="background:#252530; color:var(--accent); border:1px solid #444; padding:5px; border-radius:4px; font-size:0.7rem;">
                <option value="0">PAUSADO</option>
                <option value="0.01" selected>VELOC. 0.2x</option>
                <option value="0.05">VELOC. 1.0x</option>
            </select>
            <div class="chord-group">
                <button class="chord-btn" onclick="applyChord('maior')">MAIOR</button>
                <button class="chord-btn" onclick="applyChord('menor')">MENOR</button>
                <button class="chord-btn" onclick="applyChord('m7')">m7</button>
                <button class="chord-btn" onclick="applyChord('maj7')">7M</button>
                <button class="chord-btn" onclick="applyChord('7')">7</button>
                <button class="chord-btn" onclick="applyChord('m7b5')">m7b5</button>
            </div>
        </div>
    </div>

    <div class="grid" id="osc-container"></div>
    <canvas id="sum-canvas"></canvas>

    <script>
        const colors = ['#00f2ff', '#33ff77', '#ffcc00', '#ff3366'];
        const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const chordIntervals = {
            'maior': [0, 4, 7, 12], 'menor': [0, 3, 7, 12],
            'm7': [0, 3, 7, 10], 'maj7': [0, 4, 7, 11], 
            '7': [0, 4, 7, 10], 'm7b5': [0, 3, 6, 10]
        };

        let currentOctave = 0; // 0 = Oitava 4 (MIDI 60)
        let selectedNoteIndex = 0; // C
        let audioCtx = null, oscillators = [], timeOffset = 0, speedFactor = 0.01, isPowerOn = false;

        const keyboard = document.getElementById('keyboard');
        const octValDisplay = document.getElementById('oct-val');
        const pianoNoteName = document.getElementById('piano-note-name');

        function createKeyboard() {
            keyboard.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const isBlack = [1, 3, 6, 8, 10].includes(i % 12);
                const key = document.createElement('div');
                key.className = `key ${isBlack ? 'black' : 'white'}`;
                if (i === selectedNoteIndex) key.classList.add('active');
                
                key.onclick = () => {
                    selectedNoteIndex = i;
                    updatePianoUI();
                };
                keyboard.appendChild(key);
            }
        }

        function changeOctave(delta) {
            currentOctave = Math.max(-2, Math.min(2, currentOctave + delta));
            octValDisplay.textContent = currentOctave;
            updatePianoUI();
        }

        function updatePianoUI() {
            document.querySelectorAll('.key').forEach((k, idx) => {
                k.classList.toggle('active', idx === selectedNoteIndex);
            });
            const midi = 60 + (currentOctave * 12) + selectedNoteIndex;
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            pianoNoteName.textContent = `${noteNames[selectedNoteIndex]}${Math.floor(midi / 12) - 1} (${freq.toFixed(1)}Hz)`;
        }

        function getRootFreq() {
            const midi = 60 + (currentOctave * 12) + selectedNoteIndex;
            return 440 * Math.pow(2, (midi - 69) / 12);
        }

        // --- Resto da Lógica de Áudio e Animação ---
        const oscContainer = document.getElementById('osc-container');
        const sumCanvas = document.getElementById('sum-canvas');
        const sumCtx = sumCanvas.getContext('2d');

        for (let i = 0; i < 4; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.setProperty('--osc-color', colors[i]);
            card.innerHTML = `<div style="font-size:0.6rem; color:#555" id="note-name-${i}">-</div>
                <div class="light-switch" id="switch-${i}" onclick="toggleOsc(${i})"></div>
                <div class="knob-container"><div class="knob" id="knob-${i}"></div></div>
                <div class="freq-display" id="freq-text-${i}">0 Hz</div>
                <canvas id="canvas-${i}"></canvas>`;
            oscContainer.appendChild(card);
            oscillators.push({ freq: 0, active: false, rotation: -135, canvas: document.getElementById(`canvas-${i}`), ctx: document.getElementById(`canvas-${i}`).getContext('2d'), color: colors[i], node: null, gain: null });
            setupManualKnob(i);
        }

        function setupManualKnob(i) {
            const knob = document.getElementById(`knob-${i}`);
            let isDragging = false, lastY = 0;
            knob.addEventListener('mousedown', (e) => { isDragging = true; lastY = e.clientY; });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                updateFreq(i, oscillators[i].rotation + (lastY - e.clientY) * 2);
                lastY = e.clientY;
            });
            window.addEventListener('mouseup', () => isDragging = false);
        }

        function updateFreq(i, newRot) {
            const osc = oscillators[i];
            osc.rotation = Math.max(-135, Math.min(135, newRot));
            document.getElementById(`knob-${i}`).style.transform = `rotate(${osc.rotation}deg)`;
            osc.freq = Math.round(((osc.rotation + 135) / 270) * 1180 + 20);
            document.getElementById(`freq-text-${i}`).textContent = `${osc.freq} Hz`;
            const n = Math.round(12 * Math.log2(osc.freq / 440) + 69);
            document.getElementById(`note-name-${i}`).textContent = noteNames[n % 12] + (Math.floor(n/12)-1);
            if (osc.node && isPowerOn) osc.node.frequency.setTargetAtTime(osc.freq, audioCtx.currentTime, 0.05);
        }

        function togglePower() {
            isPowerOn = !isPowerOn;
            document.getElementById('power-wrapper').classList.toggle('power-active');
            if (isPowerOn) {
                if (!audioCtx) audioCtx = new AudioContext();
                oscillators.forEach((osc, i) => { if(osc.active) startAudio(i); });
            } else { oscillators.forEach((_, i) => stopAudio(i)); }
        }

        function toggleOsc(i) {
            oscillators[i].active = !oscillators[i].active;
            document.getElementById(`switch-${i}`).classList.toggle('on');
            if (isPowerOn) oscillators[i].active ? startAudio(i) : stopAudio(i);
        }

        function startAudio(i) {
            const osc = oscillators[i];
            if (!osc.node && osc.freq > 20) {
                osc.node = audioCtx.createOscillator();
                osc.gain = audioCtx.createGain();
                osc.node.frequency.value = osc.freq;
                osc.gain.gain.value = 0.12;
                osc.node.connect(osc.gain).connect(audioCtx.destination);
                osc.node.start();
            }
        }

        function stopAudio(i) {
            if (oscillators[i].node) {
                oscillators[i].node.stop(); oscillators[i].node.disconnect(); oscillators[i].node = null;
            }
        }

        function applyChord(type) {
            const rootFreq = getRootFreq();
            const intervals = chordIntervals[type];
            intervals.forEach((semi, i) => {
                const f = rootFreq * Math.pow(2, semi / 12);
                updateFreq(i, ((f - 20) / 1180) * 270 - 135);
                oscillators[i].active = true;
                document.getElementById(`switch-${i}`).classList.add('on');
                if (isPowerOn) { stopAudio(i); startAudio(i); }
            });
        }

        document.getElementById('speed-select').addEventListener('change', (e) => speedFactor = parseFloat(e.target.value));

        function animate() {
            sumCtx.fillStyle = '#000';
            sumCtx.fillRect(0, 0, sumCanvas.width, sumCanvas.height);
            oscillators.forEach((osc) => {
                osc.ctx.fillStyle = '#000';
                osc.ctx.fillRect(0, 0, osc.canvas.width, osc.canvas.height);
                if (osc.active && osc.freq > 20) {
                    osc.ctx.beginPath(); osc.ctx.strokeStyle = osc.color; osc.ctx.lineWidth = 2;
                    for (let x = 0; x < osc.canvas.width; x++) {
                        const y = Math.sin(2 * Math.PI * 2 * (x/osc.canvas.width) + (timeOffset * speedFactor * 10 * (osc.freq/261)));
                        const py = (osc.canvas.height / 2) + y * (osc.canvas.height / 4);
                        x === 0 ? osc.ctx.moveTo(x, py) : osc.ctx.lineTo(x, py);
                    }
                    osc.ctx.stroke();

                    sumCtx.beginPath(); sumCtx.strokeStyle = osc.color + '22';
                    for (let x = 0; x < sumCanvas.width; x++) {
                        const y = Math.sin(2 * Math.PI * (osc.freq/50) * (x/sumCanvas.width) + timeOffset * speedFactor * 10);
                        const py = (sumCanvas.height / 2) + y * (sumCanvas.height / 8);
                        x === 0 ? sumCtx.moveTo(x, py) : sumCtx.lineTo(x, py);
                    }
                    sumCtx.stroke();
                }
            });

            let actives = oscillators.filter(o => o.active);
            if (actives.length > 0 && (isPowerOn || speedFactor > 0)) {
                sumCtx.beginPath(); sumCtx.strokeStyle = '#fff'; sumCtx.lineWidth = 3;
                sumCtx.shadowBlur = 10; sumCtx.shadowColor = '#fff';
                for (let x = 0; x < sumCanvas.width; x++) {
                    let sumY = 0;
                    actives.forEach(o => { if(o.freq > 20) sumY += Math.sin(2 * Math.PI * (o.freq/50) * (x/sumCanvas.width) + timeOffset * speedFactor * 10); });
                    const py = (sumCanvas.height / 2) + sumY * (sumCanvas.height / 12);
                    x === 0 ? sumCtx.moveTo(x, py) : sumCtx.lineTo(x, py);
                }
                sumCtx.stroke(); sumCtx.shadowBlur = 0;
            }
            if (isPowerOn && speedFactor > 0) timeOffset += 1;
            requestAnimationFrame(animate);
        }

        createKeyboard();
        window.addEventListener('resize', () => {
            sumCanvas.width = sumCanvas.clientWidth; sumCanvas.height = sumCanvas.clientHeight;
            oscillators.forEach(o => { o.canvas.width = o.canvas.clientWidth; o.canvas.height = o.canvas.clientHeight; });
        });
        window.dispatchEvent(new Event('resize'));
        animate();


        
    </script>
</body>
</html>
