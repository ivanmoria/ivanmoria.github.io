  <style>
    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: white; color: #333; }

    body, html {
      overflow: hidden;
      background: #1a1a1a;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Poiret One', cursive;
    }

    /* ── CSS variables (theme) ──────────────── */
    :root {
      --c-btn:       rgba(255,255,255,0.88);
      --c-btn-brd:   rgba(255,255,255,0.28);
      --c-btn-bg:    rgba(255,255,255,0.04);
      --c-btn-hbg:   #ffffff;
      --c-btn-htxt:  #111111;
      --c-sig:       rgba(255,255,255,0.85);
      --c-ico:       rgba(255,255,255,0.75);
      --c-ico-brd:   rgba(255,255,255,0.18);
      --c-ico-bg:    rgba(255,255,255,0.04);
    }
    body.light-mode {
      --c-btn:       rgba(25,25,25,0.85);
      --c-btn-brd:   rgba(25,25,25,0.35);
      --c-btn-bg:    rgba(0,0,0,0.04);
      --c-btn-hbg:   rgba(25,25,25,0.88);
      --c-btn-htxt:  #ffffff;
      --c-sig:       rgba(25,25,25,0.85);
      --c-ico:       rgba(25,25,25,0.75);
      --c-ico-brd:   rgba(25,25,25,0.22);
      --c-ico-bg:    rgba(0,0,0,0.04);
    }

    /* ── Canvas ─────────────────────────────── */
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      display: block;
    }
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Profile card (centered column) ──────── */
    .profile-card {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: min(320px, 92vw);
    }

    /* ── Signature ───────────────────────────── */
    .signature {
      font-family: "Rock Salt", cursive;
      font-size: clamp(13px, 3.8vw, 18px);
      color: var(--c-sig);
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid transparent;
      animation: typing 3.5s steps(20, end) forwards,
                 blink  0.6s step-end infinite;
    }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink  { 50% { border-color: var(--c-sig); } }

    /* ── Social icon row ─────────────────────── */
    .social-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .social-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--c-ico-brd);
      background: var(--c-ico-bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.45s ease, background 0.25s ease, border-color 0.25s ease;
      color: var(--c-ico);
      flex-shrink: 0;
    }
    .social-btn:hover {
      background: var(--c-btn-hbg);
      border-color: var(--c-btn-hbg);
      transform: rotate(360deg) scale(1.1);
    }
    /* icons: always white svgs, invert on light mode */
    .social-btn svg { display: block; }
    .social-btn:hover svg { filter: invert(100%) sepia(0%) saturate(0%); }
    body.light-mode .social-btn svg { filter: invert(1); }
    body.light-mode .social-btn:hover svg { filter: none; }

    /* ── Link buttons ────────────────────────── */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .portfolio-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 13px 18px;
      text-align: center;
      font-family: 'Poiret One', cursive;
      font-size: clamp(17px, 4.5vw, 21px);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--c-btn);
      border: 1px solid var(--c-btn-brd);
      background: var(--c-btn-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      cursor: pointer;
      transition: background 0.22s ease, color 0.22s ease, border-color 0.22s ease, transform 0.18s ease;
    }
    .link-btn:hover {
      background: var(--c-btn-hbg);
      color: var(--c-btn-htxt);
      border-color: var(--c-btn-hbg);
      transform: scaleX(1.015);
    }
    .link-btn label { cursor: pointer; }

    /* EN button — compact sibling of Portfolio */
    .link-btn--en {
      width: 52px;
      flex-shrink: 0;
      font-size: 15px;
      letter-spacing: 0;
      padding: 13px 0;
    }

    /* ── Theme toggle ────────────────────────── */
    .theme-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .theme-label {
      font-family: 'Poiret One', cursive;
      font-size: 12px;
      color: var(--c-btn-brd);
      letter-spacing: 0.08em;
    }

    .theme-switch { display: flex; direction: rtl; }
    #theme-checkbox { display: none; }

    #theme-checkbox + label {
      font-size: 1.7rem;
      height: 1em; width: 2.5em;
      border-radius: 0.25em;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      background: rgba(200,200,200,0.35);
      position: relative;
      transition: background 0.3s;
    }
    #theme-checkbox:checked + label { background: rgba(58,58,58,0.7); }
    #theme-checkbox + label:active  { transform: scale(1.4); transition: transform 0.15s; }

    #theme-checkbox + label div {
      width: 0.8em; height: 0.8em;
      border-radius: inherit;
      position: absolute;
      top: 0.1em; left: 0.1em;
      z-index: 10;
      transition: 0.45s cubic-bezier(1, 0.33, 0.11, 1.34);
      background: #f0f0f0;
    }
    #theme-checkbox:checked + label div { left: 1.6em; background: #212121; }

    #theme-checkbox + label span  { display: flex; }
    #theme-checkbox + label svg   { height: 1em; width: 1em; padding: 0.14em; box-sizing: border-box; }
    #theme-checkbox + label span:first-of-type { color: #444; }
    #theme-checkbox + label span:last-of-type  { color: #ccc; }

    /* ── Responsive ──────────────────────────── */
    @media (max-height: 600px) {
      .profile-card { gap: 8px; }
      .link-btn { padding: 9px 14px; font-size: 16px; }
      .link-list { gap: 5px; }
      .social-btn { width: 30px; height: 30px; }
    }
    @media (max-width: 360px) {
      .link-btn--en { width: 44px; font-size: 13px; }
    }
  </style>
</head>

<script>

const NUM = 20;
const NUM_TRAILS = 128;
const BASE_RANGE = 3;

let trails = [];

let isDarkMode = true;

let explosion = false;
let exStrength = 0;

let pmx = 0;
let pmy = 0;

function setup() {

  let canvas = createCanvas(windowWidth, windowHeight);
  canvas.parent("canvas-container");

  colorMode(HSB, 360, 100, 100, 255);

  frameRate(60);

  for (let i = 0; i < NUM_TRAILS; i++) {

    let t = {

      x: Array(NUM).fill(width / 2),
      y: Array(NUM).fill(height / 2),

      sf: 0.02 + (i / NUM_TRAILS) * 0.15,

      hue: (i * 137.508) % 360,

      sat: 70 + (i % 3) * 10,

      bri: 80 + (i % 2) * 10,

      orbit: 15,

      phase: Math.random() * Math.PI * 23

    };

    trails.push(t);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
function draw() {

  background(isDarkMode ? 8 : 235);

  const mvx = mouseX - pmx;
  const mvy = mouseY - pmy;

  const speed = sqrt(mvx * mvx + mvy * mvy);

  pmx = mouseX;
  pmy = mouseY;

  const dynRange =
    map(speed, 0, 3200, BASE_RANGE, BASE_RANGE * 43, true);

  const time = millis() * 30.0003;

  // ==========================
  // Atualiza trilhas
  // ==========================

  for (let n = 0; n < trails.length; n++) {

    let t = trails[n];

    t.hue =
      (t.hue +
       0.2 +
       0.1 * sin(frameCount * 0.01 + t.phase))
      % 360;

    for (let i = 1; i < NUM; i++) {

      t.x[i - 1] = t.x[i];
      t.y[i - 1] = t.y[i];
    }

    const orbitX =
      sin(time + t.phase) * t.orbit;

    const orbitY =
      cos(time * 1.3 + t.phase) * t.orbit;

    t.x[NUM - 1] +=
      random(-dynRange, dynRange) +
      ((mouseX + orbitX) - t.x[NUM - 1]) * t.sf;

    t.y[NUM - 1] +=
      random(-dynRange, dynRange) +
      ((mouseY + orbitY) - t.y[NUM - 1]) * t.sf;

    t.x[NUM - 1] =
      constrain(t.x[NUM - 1], 0, width);

    t.y[NUM - 1] =
      constrain(t.y[NUM - 1], 0, height);
  }

  // ==========================
  // EFEITO DO CÓDIGO ANTIGO
  // linhas cruzadas
  // ==========================

  for (let a = 0; a < trails.length; a++) {

    const t1 = trails[a];

    const b =
      (a +
        17 +
        floor(
          sin(frameCount * 0.01 + a)
          * 20
        )
      ) % trails.length;

    const t2 = trails[
      (b + trails.length)
      % trails.length
    ];

    for (let i = 1; i < NUM; i++) {

      const tt = i / NUM;

      const h =
        (t1.hue +
          i * 133 +
          frameCount * 0.25)
        % 360;

      strokeWeight(
        0.4 + tt
      );

      stroke(
        h,
        90,
        100,
        tt * 10
      );

      line(
        t1.x[i],
        t1.y[i],
        t2.x[NUM - i - 1],
        t2.y[NUM - i - 1]
      );
    }
  }

  // ==========================
  // Trilhas principais
  // ==========================

  for (const t of trails) {

    for (let i = 1; i < NUM; i++) {

      const tt = i / NUM;

      const h =
        (t.hue +
          i * 38 +
          frameCount * 30.2)
        % 330;

      const sat =
        370 +
        230 * sin(
          frameCount * 0.01 +
          i * 0.3
        );

      const bri =
        753 + 25 * tt;

      // halo

      strokeWeight(
        lerp(6, 0.5, tt)
      );

      stroke(
        h,
        sat,
        bri,
        tt * 18
      );

      line(
        t.x[i - 1],
        t.y[i - 1],
        t.x[i],
        t.y[i]
      );

      // linha principal

      strokeWeight(
        lerp(2, 0.8, tt)
      );

      stroke(
        h,
        sat,
        bri,
        tt * 255
      );

      line(
        t.x[i - 1],
        t.y[i - 1],
        t.x[i],
        t.y[i]
      );
    }
  }

  if (explosion) {
    explodeLines();
  }
}

function explodeLines() {

  exStrength *= 0.95;

  for (const t of trails) {

    for (let i = 0; i < NUM; i++) {

      const dx = t.x[i] - mouseX;
      const dy = t.y[i] - mouseY;

      const dista =
        sqrt(dx * dx + dy * dy) + 1;

      const force =
        exStrength / (dista * 0.03);

      const angle =
        atan2(dy, dx);

      t.x[i] +=
        cos(angle) * force +
        random(-3, 3);

      t.y[i] +=
        sin(angle) * force +
        random(-3, 3);
    }
  }

  if (exStrength < 0.5) {
    explosion = false;
  }
}

function mousePressed() {

  explosion = true;
  exStrength = 250;
}

document
  .getElementById("theme-checkbox")
  .addEventListener("change", function () {

    isDarkMode = !isDarkMode;

    document.body.classList.toggle(
      "light-mode",
      !isDarkMode
    );
  });

</script>
