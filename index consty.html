  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: white; color: #333; }

    body, html {
      overflow: hidden;
      background: #2d2b2b;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0; display: block;
    }
    #canvas-container {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* ── Theme toggle — bottom of nav column ─── */
    .theme-row {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.13);
      width: 100%;
    }
    .theme-label {
      font-family: 'Poiret One', cursive;
      font-size: 13px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
    }
    .theme-switch { display: flex; direction: rtl; }
    #theme-checkbox { display: none; }
    #theme-checkbox + label {
      font-size: 1.7rem; height: 1em; width: 2.5em;
      border-radius: 0.25em; cursor: pointer;
      display: flex; justify-content: space-between;
      background: rgba(200,200,200,0.30); position: relative;
      transition: background 0.3s;
    }
    #theme-checkbox:checked + label { background: rgba(58,58,58,0.7); }
    #theme-checkbox + label:active  { transform: scale(1.4); transition: transform 0.15s; }
    #theme-checkbox + label div {
      width: 0.8em; height: 0.8em; border-radius: inherit;
      position: absolute; top: 0.1em; left: 0.1em; z-index: 10;
      transition: 0.45s cubic-bezier(1,0.33,0.11,1.34); background: #f0f0f0;
    }
    #theme-checkbox:checked + label div { left: 1.6em; background: #212121; }
    #theme-checkbox + label span { display: flex; }
    #theme-checkbox + label svg { height: 1em; width: 1em; padding: 0.14em; box-sizing: border-box; }
    #theme-checkbox + label span:first-of-type { color: #444; }
    #theme-checkbox + label span:last-of-type  { color: #ccc; }

    /* ── Nav buttons — center ─── */
    .link-list {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center;
    }
    .portfolio-row { display: flex; align-items: center; justify-content: center; gap: 6px; }

    .link-btn {
      color: white;
      font-family: 'Poiret One', cursive;
      font-size: clamp(18px, 4vw, 25px);
      font-weight: 600; letter-spacing: 0.04em;
      border: none; background: none;
      padding: 8px 12px; cursor: pointer;
      transition: all 0.25s ease;
      display: block;
    }
    .link-btn::after, .link-btn::before {
      content: ''; width: 0; height: 2px;
      background: #ffffff; display: block; transition: width 0.45s ease;
    }
    .link-btn::before { margin-left: auto; }
    .link-btn:hover::after, .link-btn:hover::before { width: 100%; }
    .link-btn:hover { background: white; color: black; }
    .link-btn:hover::after, .link-btn:hover::before { background: #000; }

    .link-btn--en {
      font-size: clamp(13px, 3vw, 16px);
      padding: 8px 8px;
    }

    /* ── Social icons — fixed bottom ─── */
    .social-row {
      position: fixed; bottom: 52px; left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex; flex-wrap: nowrap; gap: 5px;
    }
    .social-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.45s ease, background 0.22s ease;
      flex-shrink: 0;
    }
    .social-btn:hover { background: white; transform: rotate(360deg) scale(1.12); }
    .social-btn:hover svg { filter: invert(100%) sepia(0%) saturate(0%); }

    /* ── Signature — very bottom ─── */
    .signature-wrap {
      position: fixed; bottom: 14px; left: 50%;
      transform: translateX(-50%); z-index: 1000; white-space: nowrap;
    }
    .signature {
      font-family: "Rock Salt", cursive;
      font-size: clamp(13px, 3.5vw, 18px);
      color: rgba(255,255,255,0.84);
      white-space: nowrap; overflow: hidden;
      border-right: 2px solid transparent; cursor: help;
      animation: typing 3.5s steps(20,end) forwards, blink 0.6s step-end infinite;
    }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink  { 50% { border-color: rgba(255,255,255,0.7); } }

    @media (max-height: 560px) {
      .link-btn { font-size: 16px; padding: 5px 10px; }
      .social-row { bottom: 40px; }
      .signature-wrap { bottom: 8px; }
    }
    @media (max-width: 400px) {
      .social-btn { width: 28px; height: 28px; }
      .social-row { gap: 3px; }
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

  <script>
    // ── Interaction locks ─────────────────────────────────────────────
    document.body.style.overflow = 'hidden';
    window.onbeforeunload = null;
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy',        e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','PageUp','PageDown','Home','End',' '].includes(e.key))
        e.preventDefault();
    });
    document.addEventListener('wheel', e => e.preventDefault(), { passive: false });
    document.documentElement.style.overflow = 'hidden';
    (function () {
      let prevent = false;
      document.addEventListener('touchstart', e => {
        if (e.touches.length !== 1) return;
        prevent = (window.pageYOffset || document.body.scrollTop) === 0;
      });
      document.addEventListener('touchmove', e => {
        if (prevent) { prevent = false; e.preventDefault(); }
      });
    })();

    // ── p5.js — COMBINED animation ───────────────────────────────────
    //
    // Two rendering schemes layered on the same 6 trails:
    //
    // LAYER A — HSB colored (second rewrite):
    //   Each trail has a distinct hue (red, amber, cyan, blue, green, violet).
    //   Rendered with a wide glow pass + a thin crisp pass per trail.
    //   Gives each trail a visible color identity.
    //
    // LAYER B — grayscale + warm overlay (first rewrite / second sketch):
    //   All trails share the same rendering:
    //     · pass 1 — grayscale gradient, brighter toward the head
    //     · pass 2 — stroke(val, 22, 187, alpha): warm orange → neutral blue
    //   Gives a unified warm atmosphere tying the trails together.
    //
    // Both layers rendered per frame → the colors from A show through B.

    const NUM      = 100;
    const BASE_RNG = 3;

    const TRAILS = [
      { x: [], y: [], sf: 0.12, hue:   0 },  // fast   — red
      { x: [], y: [], sf: 0.05, hue:  55 },  // slow   — amber
      { x: [], y: [], sf: 0.09, hue: 175 },  // medium — cyan
      { x: [], y: [], sf: 0.04, hue: 220 },  // v.slow — blue
      { x: [], y: [], sf: 0.11, hue: 110 },  // fast   — green
      { x: [], y: [], sf: 0.07, hue: 280 },  // medium — violet
    ];

    // Ambient trails — follow mouse with 360° spread, different speeds + hues
    const AMBIENT = [
      { x: [], y: [], sf: 0.03, hue:  20 },  // very slow — warm orange
      { x: [], y: [], sf: 0.08, hue: 140 },  // medium    — teal
      { x: [], y: [], sf: 0.13, hue: 200 },  // fast      — sky blue
      { x: [], y: [], sf: 0.06, hue: 320 },  // slow      — pink-violet
      { x: [], y: [], sf: 0.10, hue:  80 },  // med-fast  — yellow-green
      { x: [], y: [], sf: 0.04, hue: 350 },  // very slow — crimson
    ];

    // ── Flow field ───────────────────────────────────────────────────
    const FF_N     = 140;
    const ff       = [];      // particles driven by Perlin noise vectors

    // ── Constellation ────────────────────────────────────────────────
    const CONN_DIST = 130;    // max px distance to draw a connection line
    const nodes     = [];     // drifting nodes

    let isDarkMode = true;
    let explosion  = false;
    let exStr      = 8;
    let pmx = 0, pmy = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('canvas-container');
      frameRate(60);
      // Assign evenly spaced angles (0–360°) across all 12 trails,
      // and initialise each one at its angle position so they start spread out
      const ALL = [...TRAILS, ...AMBIENT];
      ALL.forEach((t, k) => {
        t.ang = (TWO_PI * k) / ALL.length;
        t.x   = Array(NUM).fill(width  / 2 + cos(t.ang) * 80);
        t.y   = Array(NUM).fill(height / 2 + sin(t.ang) * 80);
      });
      // Scatter flow-field particles
      for (let i = 0; i < FF_N; i++)
        ff.push({ x: random(width), y: random(height), spd: random(1.2, 2.5) });
      // Scatter constellation nodes
      for (let i = 0; i < 55; i++)
        nodes.push({ x: random(width), y: random(height),
                     vx: random(-0.35, 0.35), vy: random(-0.35, 0.35), r: random(1.5, 3) });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      [...TRAILS, ...AMBIENT].forEach(t => {
        t.x = Array(NUM).fill(width  / 2 + cos(t.ang) * 80);
        t.y = Array(NUM).fill(height / 2 + sin(t.ang) * 80);
      });
      ff.length = 0;
      for (let i = 0; i < FF_N; i++)
        ff.push({ x: random(width), y: random(height), spd: random(1.2, 2.5) });
      nodes.length = 0;
      for (let i = 0; i < 55; i++)
        nodes.push({ x: random(width), y: random(height),
                     vx: random(-0.35, 0.35), vy: random(-0.35, 0.35), r: random(1.5, 3) });
    }

    function draw() {
      const vx  = mouseX - pmx, vy = mouseY - pmy;
      const spd = sqrt(vx * vx + vy * vy);
      pmx = mouseX; pmy = mouseY;
      const rng = map(spd, 0, 28, BASE_RNG, BASE_RNG * 2.8, true);

      background(isDarkMode ? 45 : 203);

      // Hue shift driven by mouse position:
      // Y axis → 0–270° (dominant), X axis → 0–90° (fine-tune) = full 360° range
      const hueShift = map(mouseY, 0, height, 0, 270) + map(mouseX, 0, width, 0, 90);

      colorMode(HSB, 360, 100, 100, 255);

      // ── FLOW FIELD — Perlin noise vector field ────────────────────
      // Particles follow noise-driven angles; hue matches mouse position
      {
        const ns = 0.0035, nt = frameCount * 0.004;
        strokeWeight(1.3); noFill();
        for (const p of ff) {
          const angle = noise(p.x * ns, p.y * ns, nt) * TWO_PI * 2;
          const nx = p.x + cos(angle) * p.spd;
          const ny = p.y + sin(angle) * p.spd;
          stroke((hueShift + 30) % 360, 60, isDarkMode ? 90 : 65, isDarkMode ? 80 : 58);
          line(p.x, p.y, nx, ny);
          p.x = (nx < 0) ? width  : (nx > width)  ? 0 : nx;
          p.y = (ny < 0) ? height : (ny > height) ? 0 : ny;
        }
      }

      // ── CONSTELLATION — proximity-connected drifting nodes ────────
      // Nodes drift slowly; mouse attracts near ones; lines between close pairs
      {
        const cHue = (hueShift + 120) % 360;
        // Update positions
        for (const n of nodes) {
          const md = dist(mouseX, mouseY, n.x, n.y);
          if (md < 180) { n.vx += (mouseX - n.x) * 0.00015; n.vy += (mouseY - n.y) * 0.00015; }
          n.vx *= 0.995; n.vy *= 0.995;
          n.x += n.vx;   n.y += n.vy;
          if (n.x < 0 || n.x > width)  n.vx *= -1;
          if (n.y < 0 || n.y > height) n.vy *= -1;
        }
        // Node–node connections
        strokeWeight(0.5);
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const d = dist(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
            if (d < CONN_DIST) {
              stroke(cHue, 55, isDarkMode ? 85 : 58,
                     map(d, 0, CONN_DIST, isDarkMode ? 90 : 65, 0));
              line(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
            }
          }
        }
        // Mouse–node connections
        strokeWeight(0.7);
        for (const n of nodes) {
          const d = dist(mouseX, mouseY, n.x, n.y);
          if (d < CONN_DIST * 1.5) {
            stroke(cHue, 65, isDarkMode ? 92 : 65,
                   map(d, 0, CONN_DIST * 1.5, isDarkMode ? 130 : 95, 0));
            line(mouseX, mouseY, n.x, n.y);
          }
        }
        // Dots
        noStroke();
        for (const n of nodes) {
          const a = map(dist(mouseX, mouseY, n.x, n.y), 0, 260,
                        isDarkMode ? 200 : 155, isDarkMode ? 65 : 40, true);
          fill(cHue, 55, isDarkMode ? 90 : 62, a);
          circle(n.x, n.y, n.r * 2);
        }
      }

      strokeWeight(1); noFill();

      // Each trail targets its own orbit point around the mouse:
      // evenly spaced 30° apart (12 trails) + slow global rotation
      const ORBIT_R = 1;
      const rot     = frameCount * 0.005;   // ~1 full spin per 20 s

      for (const t of TRAILS) {
        for (let i = 1; i < NUM; i++) { t.x[i-1] = t.x[i]; t.y[i-1] = t.y[i]; }
        const tx = mouseX + cos(t.ang + rot) * ORBIT_R;
        const ty = mouseY + sin(t.ang + rot) * ORBIT_R;
        t.x[NUM-1] += random(-rng, rng) + (tx - t.x[NUM-1]) * t.sf;
        t.y[NUM-1] += random(-rng, rng) + (ty - t.y[NUM-1]) * t.sf;
        t.x[NUM-1]  = constrain(t.x[NUM-1], 0, width);
        t.y[NUM-1]  = constrain(t.y[NUM-1], 0, height);
      }

      for (const a of AMBIENT) {
        for (let i = 1; i < NUM; i++) { a.x[i-1] = a.x[i]; a.y[i-1] = a.y[i]; }
        const tx = mouseX + cos(a.ang + rot) * ORBIT_R;
        const ty = mouseY + sin(a.ang + rot) * ORBIT_R;
        a.x[NUM-1] += random(-rng, rng) + (tx - a.x[NUM-1]) * a.sf;
        a.y[NUM-1] += random(-rng, rng) + (ty - a.y[NUM-1]) * a.sf;
        a.x[NUM-1]  = constrain(a.x[NUM-1], 0, width);
        a.y[NUM-1]  = constrain(a.y[NUM-1], 0, height);
      }

      // ── LAYER A: HSB per-trail color (glow + crisp) ──────────────
      colorMode(HSB, 360, 100, 100, 255);
      const sat = isDarkMode ? 68 : 58;
      const bri = isDarkMode ? 96 : 55;

      for (const t of TRAILS) {
        // A1 — glow: wide stroke, very transparent
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          strokeWeight(lerp(2.5, 0.4, tt));
          stroke((t.hue + hueShift) % 360, sat, bri, tt * 16);
          line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
        }
        // A2 — crisp: thin stroke, fades in toward head
        strokeWeight(1);
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          stroke((t.hue + hueShift) % 360, sat - 14, bri, tt * 95);
          line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
        }
      }

      // A3 — ambient trails: identical rendering to TRAILS
      for (const a of AMBIENT) {
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          strokeWeight(lerp(2.5, 0.4, tt));
          stroke((a.hue + hueShift) % 360, sat, bri, tt * 16);
          line(a.x[i-1], a.y[i-1], a.x[i], a.y[i]);
        }
        strokeWeight(1);
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          stroke((a.hue + hueShift) % 360, sat - 14, bri, tt * 95);
          line(a.x[i-1], a.y[i-1], a.x[i], a.y[i]);
        }
      }

      // ── LAYER B: grayscale + warm overlay (applied to all trails) ─
      colorMode(RGB, 255);

      // Layer B applied equally to all 12 trails
      const ALL = [...TRAILS, ...AMBIENT];

      // B0 — soft glow (wide, very transparent warm overlay)
      strokeWeight(5);
      for (let i = 1; i < NUM; i++) {
        const val   = (i / NUM) * 200 + 32;
        const alpha = min((i + 4) * 0.6, 35);
        stroke(isDarkMode ? val       : val * 0.55,
               isDarkMode ? 22        : 20,
               isDarkMode ? 187       : 140,
               alpha);
        for (const t of ALL) line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
      }

      // B1 — grayscale gradient
      strokeWeight(1);
      for (let i = 1; i < NUM; i++) {
        const val = (i / NUM) * 100 + 3;
        stroke(isDarkMode ? val + 110 : val);
        for (const t of ALL) line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
      }

      // B2 — colorful warm overlay: stroke(val, 22, 187, alpha)
      for (let j = 1; j < NUM; j++) {
        const val   = (j / NUM) * 200 + 32;
        const alpha = min(2 * (j + 4), 180);
        stroke(isDarkMode ? val       : val * 0.55,
               isDarkMode ? 22        : 20,
               isDarkMode ? 187       : 140,
               isDarkMode ? alpha     : alpha * 0.55);
        for (const t of ALL) line(t.x[j-1], t.y[j-1], t.x[j], t.y[j]);
      }

      if (explosion) explodeLines();
    }

    function explodeLines() {
      for (const t of TRAILS) {
        for (let i = 0; i < NUM; i++) {
          const a = atan2(t.y[i] - mouseY, t.x[i] - mouseX);
          t.x[i] += cos(a) * exStr;
          t.y[i] += sin(a) * exStr;
        }
      }
      // Ambient trails also react to explosion, but softer
      for (const a of AMBIENT) {
        for (let i = 0; i < NUM; i++) {
          const ang = atan2(a.y[i] - mouseY, a.x[i] - mouseX);
          a.x[i] += cos(ang) * exStr * 0.55;
          a.y[i] += sin(ang) * exStr * 0.55;
        }
      }
      if (frameCount % 10 === 0) exStr *= 0.88;
      if (exStr < 0.1) { explosion = false; exStr = 8; }
    }

    function mousePressed() { explosion = true; exStr = 8; }

    document.getElementById('theme-checkbox').addEventListener('change', function () {
      isDarkMode = !isDarkMode;
    });
  </script>

</body>
</html>
