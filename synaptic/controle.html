<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Painel de Controle</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
    h1 { text-align: center; margin-bottom: 10px; }
    .row { display: flex; flex-wrap: wrap; justify-content: space-around; margin-bottom: 30px; }
    .card { background: #1e1e1e; padding: 15px 15px 10px 15px; margin: 10px; border-radius: 10px; flex: 1 1 300px; max-width: 400px; position: relative; }
    .card h2 { margin-top: 0; margin-bottom: 10px; font-size: 1.3em; color: #f0f0f0; }
    button { margin: 5px 5px 5px 0; padding: 10px 14px; font-size: 1em; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; user-select: none; }
    button:hover { background: #555; }
    input[type=number], input[type=text] { width: 140px; padding: 6px 8px; font-size: 1em; border-radius: 5px; border: none; margin-left: 10px; background: #333; color: white; }
    label { font-size: 1em; vertical-align: middle; margin-left: 10px; display: inline-block; margin-bottom: 10px; }
    .participant-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .participant-name-input { flex-shrink: 0; min-width: 140px; }
    .preview-card { width: 100%; background: #1e1e1e; padding: 15px 15px 10px 15px; border-radius: 10px; margin: 0 auto 20px auto; overflow: hidden; }
    .preview-card h2 { margin-top: 0; margin-bottom: 10px; text-align: center; }
    .preview-card iframe { width: 100%; height: 280px; border: none; border-radius: 8px; display: block; }
    .update-name-btn { margin-left: 10px; font-size: 16px; background: #c0392b; color: #fff; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; transition: 0.3s ease; user-select: none; }
    .update-name-btn.checked { background: #27ae60; color: #fff; }
    .update-name-btn:hover { transform: scale(1.2); }
    input[type=range] { width: 100%; height: 8px; background: #555; border-radius: 5px; outline: none; margin: 0; cursor: pointer; transition: 0.3s ease; }
    input[type=range]:hover { background: #777; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; background: #27ae60; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.3s ease; box-shadow: 0 0 6px rgba(39, 174, 96, 0.6); margin-top: -7px; }
    input[type=range]::-webkit-slider-thumb:hover { background: #2ecc71; transform: scale(1.2); }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; background: #27ae60; border-radius: 50%; border: 2px solid #fff; cursor: pointer; box-shadow: 0 0 6px rgba(39, 174, 96, 0.6); transition: 0.3s ease; }
    input[type=range]::-moz-range-thumb:hover { background: #2ecc71; transform: scale(1.2); }
    .role-buttons { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .role-buttons button { flex: 1 1 110px; font-size: 0.9em; padding: 6px 8px; background: #444; border-radius: 5px; transition: 0.3s ease; }
    .role-buttons button:hover { background: #666; }
    .random-mode h2 { margin-bottom: 15px; text-align: center; }
    .random-mode .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
    .random-mode .control-row { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
    .random-mode label { font-size: 1em; color: white; white-space: nowrap; }
    .random-mode input[type="number"] { width: 60px; padding: 5px 8px; font-size: 1em; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: white; text-align: center; }
    .random-mode .export-row { display: flex; justify-content: center; }
    #toggleRandomBtn { color: #fff; border: none; border-radius: 6px; padding: 10px 14px; font-size: 1em; cursor: pointer; user-select: none; transition: 0.3s ease; background-color: #27ae60; }
#langToggleBtn {
  position: absolute;
  top: 20px;
  right: 20px;
  color: white;
  font-weight: bold;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  min-width: 70px;
  transition: all 0.3s ease; /* Transição suave de cor e sombra */
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  text-transform: uppercase;
}

/* Efeito de Hover Geral */
#langToggleBtn:hover {
  transform: translateY(-2px); /* Sobe levemente */
  box-shadow: 0 6px 12px rgba(0,0,0,0.4);
  filter: brightness(1.2); /* Brilha um pouco mais */
}

#langToggleBtn:active {
  transform: translateY(0);
}

/* Cores específicas por idioma */
.btn-pt { background-color: #27ae60 !important; } /* Verde */
.btn-en { background-color: #2980b9 !important; } /* Azul */

  </style>
</head>
<body>

<button id="langToggleBtn" onclick="toggleLang()">PT</button>


  <h1 data-i18n="title">Painel de Controle</h1>

  <div class="row">
    <div class="card">
      <h2>
        <span data-i18n="part1">Participante 1:</span>
        <input type="text" id="leftNameInput" class="participant-name-input" data-i18n-placeholder="insertName" placeholder="inserir nome" />
        <button id="leftUpdateBtn" class="update-name-btn" title="Atualizar Nome">✔️</button>
      </h2>
      <div class="participant-row" style="flex-direction: column; gap: 6px;">
        <input type="range" id="leftRoleSlider" min="0" max="4" step="1" value="0" />
        <br>
        <span id="leftRoleLabel" style="min-width: 90px; text-align: center; font-weight: bold; user-select:none;">Dependente</span>

        <div class="role-buttons" id="leftRoleButtons">
          <button data-role="Dependent">Dependent</button>
          <button data-role="Follower">Follower</button>
          <button data-role="Partner">Partner</button>
          <button data-role="Leader">Leader</button>
          <button data-role="Resister">Resister</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>
        <span data-i18n="part2">Participante 2:</span>
        <input type="text" id="rightNameInput" class="participant-name-input" data-i18n-placeholder="insertName" placeholder="inserir nome" />
        <button id="rightUpdateBtn" class="update-name-btn" title="Atualizar Nome">✔️</button>
      </h2>
      <div class="participant-row" style="flex-direction: column; gap: 6px;">
        <input type="range" id="rightRoleSlider" min="0" max="4" step="1" value="0" />
        <br>
        <span id="rightRoleLabel" style="min-width: 90px; text-align: center; font-weight: bold; user-select:none;">Dependente</span>

        <div class="role-buttons" id="rightRoleButtons">
          <button data-role="Dependent">Dependent</button>
          <button data-role="Follower">Follower</button>
          <button data-role="Partner">Partner</button>
          <button data-role="Leader">Leader</button>
          <button data-role="Resister">Resister</button>
        </div>
      </div>
    </div>

    <div class="card random-mode">
      <h2 data-i18n="randMode">🔀 Modo Aleatório</h2>

      <div class="nav-buttons">
        <button onclick="prevRandom()" data-i18n="btnPrev">⬅️ Voltar</button>
        <button onclick="nextRandom()" data-i18n="btnNext">Avançar ➡️</button>
      </div>

      <div class="control-row">
        <button id="toggleRandomBtn" onclick="toggleRandom()">Iniciar</button>
        <label for="minInterval" data-i18n="minTime">Tempo mínimo (s):</label>
        <input id="minInterval" type="number" min="1" value="5" />
      </div>

      <div class="export-row" style="gap: 10px; display: flex; justify-content: center; align-items: center;">
        <button onclick="exportCSV()" data-i18n="btnExport">📥 Exportar CSV</button>
        <button id="recordToggleBtn" data-i18n="btnRec">🎥 Gravar Webcam</button>
      </div>

      <div id="recorderContainer" style="display:none; margin-top: 15px; text-align: center;">
        <video id="previewVideo" autoplay muted playsinline style="width: 320px; height: 240px; background: black; border-radius: 8px;"></video>
        <div style="margin-top: 10px;">
          <button id="startRecBtn" data-i18n="btnStartRec">Iniciar Gravação</button>
          <button id="stopRecBtn" data-i18n="btnStopRec" disabled>Parar Gravação</button>
        </div>

        <div id="recordTimer" style="font-size: 1.2em; margin-top: 8px; color: #27ae60; user-select:none;">00:00</div>

        <h3 data-i18n="recTitle">Vídeo Gravado:</h3>
        <video id="recordedVideo" controls style="width: 320px; height: 240px; background: black; border-radius: 8px; display:none;"></video>

        <div style="margin-top: 10px;">
          <button id="downloadRecBtn" style="display:inline-block;" data-i18n="btnDownload">⬇️ Baixar Vídeo</button>
        </div>
      </div>
    </div>
  </div>

  <div class="preview-card">
    <h2>
      <p style="text-align: center; margin-top:-10px;margin-bottom: 10px;">
        <a href="tela.html" target="_blank" style="color: #00BFFF; text-decoration: none; font-weight: bold;" data-i18n="openTab">
          🔗 Abrir tela de projeção em nova aba
        </a>
      </p>
    </h2>
    <iframe style="margin-bottom:-20px;" src="tela.html"></iframe>
  </div>

<script>
  const channel = new BroadcastChannel("improvisacao");
  const roles = ["Dependent", "Follower", "Partner", "Leader", "Resister"];
  let intervalId;
  let history = [];
  let currentIndex = -1;
  let startTime = null;
  let isRandomRunning = false;
  let leaderSide = "left";
  let leaderRoundsLeft = 3;
  let nonLeaderIndex = 0;
  const allNonLeaderRoles = ["Dependent", "Follower", "Partner", "Resister"];
  let nonLeaderRoles = [...allNonLeaderRoles]; 

  let savedLeftName = "";
  let savedRightName = "";

  // Dicionário de Idiomas
  let currentLang = 'pt';
  const uiI18n = {
    pt: {
      title: "Painel de Controle", part1: "Participante 1:", part2: "Participante 2:",
      insertName: "inserir nome", randMode: "🔀 Modo Aleatório", btnPrev: "⬅️ Voltar",
      btnNext: "Avançar ➡️", btnStart: "Iniciar", btnStop: "Parar", minTime: "Tempo mínimo (s):",
      btnExport: "📥 Exportar CSV", btnRec: "🎥 Gravar Webcam", btnCloseRec: "❌ Fechar Gravação",
      btnStartRec: "Iniciar Gravação", btnStopRec: "Parar Gravação", recTitle: "Vídeo Gravado:",
      btnDownload: "⬇️ Baixar Vídeo", openTab: "🔗 Abrir tela de projeção em nova aba",
      roles: { "Dependent": "Dependente", "Follower": "Seguidor", "Partner": "Parceiro", "Leader": "Líder", "Resister": "Resistente" }
    },
    en: {
      title: "Control Panel", part1: "Participant 1:", part2: "Participant 2:",
      insertName: "insert name", randMode: "🔀 Random Mode", btnPrev: "⬅️ Back",
      btnNext: "Forward ➡️", btnStart: "Start", btnStop: "Stop", minTime: "Min time (s):",
      btnExport: "📥 Export CSV", btnRec: "🎥 Record Webcam", btnCloseRec: "❌ Close Recording",
      btnStartRec: "Start Recording", btnStopRec: "Stop Recording", recTitle: "Recorded Video:",
      btnDownload: "⬇️ Download Video", openTab: "🔗 Open projection screen in new tab",
      roles: { "Dependent": "Dependent", "Follower": "Follower", "Partner": "Partner", "Leader": "Leader", "Resister": "Resister" }
    }
  };

  const leftInput = document.getElementById('leftNameInput');
  const rightInput = document.getElementById('rightNameInput');
  const leftBtn = document.getElementById('leftUpdateBtn');
  const rightBtn = document.getElementById('rightUpdateBtn');
  const leftSlider = document.getElementById('leftRoleSlider');
  const rightSlider = document.getElementById('rightRoleSlider');
  const leftLabel = document.getElementById('leftRoleLabel');
  const rightLabel = document.getElementById('rightRoleLabel');
  const leftRoleButtons = document.getElementById('leftRoleButtons');
  const rightRoleButtons = document.getElementById('rightRoleButtons');
  const toggleRandomBtn = document.getElementById('toggleRandomBtn');
function toggleLang() {
    currentLang = currentLang === 'pt' ? 'en' : 'pt';
    applyLang();
  }

  function applyLang() {
    const langBtn = document.getElementById('langToggleBtn');
    
    // Atualiza Texto e Cor do Botão
    if (langBtn) {
      langBtn.textContent = currentLang;
      // Remove classes antigas e adiciona a nova conforme o idioma
      langBtn.classList.remove('btn-pt', 'btn-en');
      langBtn.classList.add(currentLang === 'pt' ? 'btn-pt' : 'btn-en');
    }

    // --- Restante da lógica de tradução (mantida) ---
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (uiI18n[currentLang][key]) el.textContent = uiI18n[currentLang][key];
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      if (uiI18n[currentLang][key]) el.placeholder = uiI18n[currentLang][key];
    });

    if (isRandomRunning) {
      toggleRandomBtn.textContent = uiI18n[currentLang].btnStop;
    } else {
      toggleRandomBtn.textContent = uiI18n[currentLang].btnStart;
    }

    const recToggleBtn = document.getElementById("recordToggleBtn");
    if (document.getElementById("recorderContainer").style.display === "block") {
      recToggleBtn.textContent = uiI18n[currentLang].btnCloseRec;
    } else {
      recToggleBtn.textContent = uiI18n[currentLang].btnRec;
    }

    updateRole('left', leftSlider.value, false);
    updateRole('right', rightSlider.value, false);
    
    document.querySelectorAll('.role-buttons button').forEach(btn => {
      const roleKey = btn.getAttribute('data-role');
      btn.textContent = uiI18n[currentLang].roles[roleKey];
    });

    channel.postMessage({ lang: currentLang });
    
    if (!leftInput.value.trim()) sendLeftName();
    if (!rightInput.value.trim()) sendRightName();
  }

  function updateButtonColor(inputElem, btnElem, savedName) {
    if (inputElem.value.trim() === savedName && savedName !== "") {
      btnElem.classList.add('checked');
    } else {
      btnElem.classList.remove('checked');
    }
  }
  function sendLeftName() {
    savedLeftName = leftInput.value.trim() || (currentLang === 'pt' ? "Participante 1" : "Participant 1");
    channel.postMessage({ leftName: savedLeftName });
    updateButtonColor(leftInput, leftBtn, savedLeftName);
  }
  function sendRightName() {
    savedRightName = rightInput.value.trim() || (currentLang === 'pt' ? "Participante 2" : "Participant 2");
    channel.postMessage({ rightName: savedRightName });
    updateButtonColor(rightInput, rightBtn, savedRightName);
  }
  leftInput.addEventListener('input', () => updateButtonColor(leftInput, leftBtn, savedLeftName));
  rightInput.addEventListener('input', () => updateButtonColor(rightInput, rightBtn, savedRightName));
  leftBtn.addEventListener('click', sendLeftName);
  rightBtn.addEventListener('click', sendRightName);

  function updateRole(side, value, broadcast = true) {
    const role = roles[value];
    const translatedRole = uiI18n[currentLang].roles[role];
    
    if(side === 'left') {
      leftLabel.textContent = translatedRole;
      leftSlider.value = value;
      highlightRoleButton(leftRoleButtons, role);
    } else {
      rightLabel.textContent = translatedRole;
      rightSlider.value = value;
      highlightRoleButton(rightRoleButtons, role);
    }
    if (broadcast) send(side, role);
  }

  function highlightRoleButton(container, role) {
    [...container.children].forEach(btn => {
      btn.style.backgroundColor = (btn.dataset.role === role) ? '#27ae60' : '#444';
      btn.style.color = (btn.dataset.role === role) ? '#fff' : '#ddd';
    });
  }

  leftSlider.addEventListener('input', () => updateRole('left', leftSlider.value));
  rightSlider.addEventListener('input', () => updateRole('right', rightSlider.value));
  leftRoleButtons.addEventListener('click', e => {
    if(e.target.tagName === 'BUTTON') {
      const role = e.target.dataset.role;
      updateRole('left', roles.indexOf(role));
    }
  });
  rightRoleButtons.addEventListener('click', e => {
    if(e.target.tagName === 'BUTTON') {
      const role = e.target.dataset.role;
      updateRole('right', roles.indexOf(role));
    }
  });

  function send(side, role) {
    const data = {};
    data[side] = role;
    channel.postMessage(data);
  }

  function getElapsedTime() {
    const now = new Date();
    const diff = Math.floor((now - startTime) / 1000);
    const min = String(Math.floor(diff / 60)).padStart(2, '0');
    const sec = String(diff % 60).padStart(2, '0');
    return `${min}:${sec}`;
  }

  function applyRoles(leftRole, rightRole) {
    channel.postMessage({ left: leftRole, right: rightRole });
  }

  function generateNewStep() {
    let leftRole, rightRole;
    if (leaderSide === "left") {
      leftRole = "Leader"; rightRole = nonLeaderRoles[nonLeaderIndex % nonLeaderRoles.length];
    } else {
      rightRole = "Leader"; leftRole = nonLeaderRoles[nonLeaderIndex % nonLeaderRoles.length];
    }
    nonLeaderIndex++;
    leaderRoundsLeft--;
    if (leaderRoundsLeft <= 0) {
      leaderSide = (leaderSide === "left") ? "right" : "left";
      leaderRoundsLeft = 3;
      nonLeaderIndex = 0;
      nonLeaderRoles = [...allNonLeaderRoles];
      shuffleArray(nonLeaderRoles);
    }
    const timestamp = getElapsedTime();
    const step = { tempo: timestamp, left: leftRole, right: rightRole };
    history.push(step);
    currentIndex = history.length - 1;
    applyRoles(leftRole, rightRole);
    updateRole('left', roles.indexOf(leftRole));
    updateRole('right', roles.indexOf(rightRole));
  }

  function startRandom() {
    stopRandom();
    history = [];
    currentIndex = -1;
    startTime = new Date();
    function loop() {
      generateNewStep();
      const minSec = parseInt(document.getElementById('minInterval').value);
      const minTime = isNaN(minSec) || minSec < 1 ? 5 : minSec;
      intervalId = setTimeout(loop, minTime * 1000);
    }
    loop();
  }

  function stopRandom() {
    if (intervalId) { clearTimeout(intervalId); intervalId = null; }
  }

  function prevRandom() {
    if (currentIndex > 0) {
      currentIndex--;
      const { left, right } = history[currentIndex];
      applyRoles(left, right);
      updateRole('left', roles.indexOf(left));
      updateRole('right', roles.indexOf(right));
    }
  }

  function nextRandom() {
    if (isRandomRunning) {
      generateNewStep();
    } else {
      if (currentIndex < history.length - 1) {
        currentIndex++;
        const { left, right } = history[currentIndex];
        applyRoles(left, right);
        updateRole('left', roles.indexOf(left));
        updateRole('right', roles.indexOf(right));
      } else {
        generateNewStep();
      }
    }
  }

  function exportCSV() {
    if (history.length === 0) {
      alert(currentLang === 'pt' ? "Nenhuma etapa registrada ainda." : "No steps recorded yet.");
      return;
    }
    let csv = "tempo,left,right\n";
    history.forEach(row => { csv += `${row.tempo},${row.left},${row.right}\n`; });
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "historico_interacao.csv";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  function toggleRandom() {
    if (isRandomRunning) {
      stopRandom();
      toggleRandomBtn.textContent = uiI18n[currentLang].btnStart;
      toggleRandomBtn.style.backgroundColor = "#27ae60"; 
      isRandomRunning = false;
    } else {
      startRandom();
      toggleRandomBtn.textContent = uiI18n[currentLang].btnStop;
      toggleRandomBtn.style.backgroundColor = "#c0392b"; 
      isRandomRunning = true;
    }
  }

(() => {
  const recordToggleBtn = document.getElementById("recordToggleBtn");
  const recorderContainer = document.getElementById("recorderContainer");
  const previewVideo = document.getElementById("previewVideo");
  const recordedVideo = document.getElementById("recordedVideo");
  const startRecBtn = document.getElementById("startRecBtn");
  const stopRecBtn = document.getElementById("stopRecBtn");
  const recordTimer = document.getElementById("recordTimer");
  const downloadRecBtn = document.getElementById("downloadRecBtn");

  let mediaStream = null; let mediaRecorder = null; let recordedChunks = [];
  let timerInterval = null; let startTime = null;

  recordToggleBtn.onclick = () => {
    if (recorderContainer.style.display === "none") {
      openRecorder();
    } else {
      closeRecorder();
    }
  };

  async function openRecorder() {
    recorderContainer.style.display = "block";
    recordToggleBtn.textContent = uiI18n[currentLang].btnCloseRec;
    if (!mediaStream) {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        previewVideo.srcObject = mediaStream;
      } catch (err) {
        alert("Erro ao acessar webcam: " + err.message);
        closeRecorder();
      }
    }
  }

  function closeRecorder() {
    recorderContainer.style.display = "none";
    recordToggleBtn.textContent = uiI18n[currentLang].btnRec;
    stopRecordingIfActive();
    if (mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
    previewVideo.srcObject = null;
    recordedVideo.style.display = "none";
    recordedVideo.src = "";
    recordTimer.textContent = "00:00";
    downloadRecBtn.style.display = "none";
  }

  function stopRecordingIfActive() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    startRecBtn.disabled = false; stopRecBtn.disabled = true;
    clearInterval(timerInterval); timerInterval = null; recordTimer.textContent = "00:00";
  }

  function startTimer() {
    startTime = Date.now();
    recordTimer.textContent = "00:00";
    timerInterval = setInterval(() => {
      const elapsedMs = Date.now() - startTime;
      const totalSeconds = Math.floor(elapsedMs / 1000);
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      recordTimer.textContent = `${minutes}:${seconds}`;
    }, 250);
  }

  startRecBtn.onclick = () => {
    if (!mediaStream) return;
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(mediaStream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: "video/webm" });
      recordedVideo.src = URL.createObjectURL(blob);
      recordedVideo.style.display = "block";
      recordedVideo.controls = true;
      recordedVideo.play();
      downloadRecBtn.style.display = "inline-block";
      downloadRecBtn.onclick = () => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.style.display = "none"; a.href = url;
        a.download = `gravacao_${new Date().toISOString().replace(/[:.]/g, '-')}.webm`;
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
      };
    };
    mediaRecorder.start();
    startRecBtn.disabled = true; stopRecBtn.disabled = false; downloadRecBtn.style.display = "none";
    startTimer();
  };

  stopRecBtn.onclick = () => { stopRecordingIfActive(); };
})();

// Inicia com o idioma atual e renderiza os papéis padrões ao carregar
applyLang();
initSliders();

function initSliders() {
  updateRole('left', leftSlider.value);
  updateRole('right', rightSlider.value);
}
</script>
</body>
</html>
