<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Painel de Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; padding: 20px; overflow-x: hidden; }
    h1 { text-align: center; margin-bottom: 10px; }
    .row { display: flex; flex-wrap: wrap; justify-content: space-around; margin-bottom: 30px; }
    .card { background: #1e1e1e; padding: 15px 15px 10px 15px; margin: 10px; border-radius: 10px; flex: 1 1 300px; max-width: 400px; position: relative; }
    .card h2 { margin-top: 0; margin-bottom: 10px; font-size: 1.3em; color: #f0f0f0; }
    button { margin: 5px 5px 5px 0; padding: 10px 14px; font-size: 1em; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; user-select: none; }
    button:hover { background: #555; }
    
    #audioToggleBtn { background: #e67e22; font-weight: bold; width: 100%; margin-bottom: 10px; }
    #audioToggleBtn.muted { background: #7f8c8d; }

    input[type=number], input[type=text] { width: 140px; padding: 6px 8px; font-size: 1em; border-radius: 5px; border: none; margin-left: 10px; background: #333; color: white; }
    .participant-row { display: flex; flex-direction: column; gap: 6px; }
    .preview-card { width: 100%; background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .preview-card iframe { width: 100%; height: 280px; border: none; border-radius: 8px; }
    
    .update-name-btn { margin-left: 10px; background: #27ae60; color: #fff; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }

    input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
    .role-buttons { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .role-buttons button { flex: 1 1 110px; font-size: 0.85em; background: #444; }

    #langToggleBtn { position: absolute; top: 20px; right: 20px; color: white; font-weight: bold; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; z-index: 2000; }
    .btn-pt { background-color: #27ae60 !important; }
    .btn-en { background-color: #2980b9 !important; }

    #lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #121212; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-box { background: #1e1e1e; padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #333; }
    #target-id { 
      background: #333; color: #2ecc71; border: none; padding: 15px; 
      font-size: 2.5em; width: 150px; text-align: center; border-radius: 10px; 
      letter-spacing: 5px; margin-top: 20px;
    }
  </style>
</head>
<body>

<div id="lock-screen">
  <div class="login-box">
    <h2 id="login-status">Digite o ID da Tela</h2>
    <input type="tel" id="target-id" maxlength="4" placeholder="0000">
    <p style="color: #666; margin-top: 20px;">A conexão será automática ao digitar 4 dígitos.</p>
    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #333;">
      <a href="tela.html" target="_blank" style="color: #3498db; text-decoration: none; font-size: 0.9em; font-weight: bold;">
        Abrir Tela de Projeção
      </a>
    </div>
  </div>
</div>

<button id="langToggleBtn" onclick="toggleLang()" class="btn-pt">PT</button>

<h1 data-i18n="title">Painel de Controle</h1>

<div class="row">
  <div class="card">
    <h2>
      <span data-i18n="part1">Participante 1:</span>
      <input type="text" id="leftNameInput" data-i18n-placeholder="insertName" placeholder="inserir nome" />
      <button id="leftUpdateBtn" class="update-name-btn">✔️</button>
    </h2>
    <div class="participant-row">
      <input type="range" id="leftRoleSlider" min="0" max="4" step="1" value="0" />
      <span id="leftRoleLabel" style="text-align: center; font-weight: bold;">Dependente</span>
      <div class="role-buttons" id="leftRoleButtons">
        <button data-role="Dependent">Dependent</button>
        <button data-role="Follower">Follower</button>
        <button data-role="Partner">Partner</button>
        <button data-role="Leader">Leader</button>
        <button data-role="Resister">Resister</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>
      <span data-i18n="part2">Participante 2:</span>
      <input type="text" id="rightNameInput" data-i18n-placeholder="insertName" placeholder="inserir nome" />
      <button id="rightUpdateBtn" class="update-name-btn">✔️</button>
    </h2>
    <div class="participant-row">
      <input type="range" id="rightRoleSlider" min="0" max="4" step="1" value="0" />
      <span id="rightRoleLabel" style="text-align: center; font-weight: bold;">Dependente</span>
      <div class="role-buttons" id="rightRoleButtons">
        <button data-role="Dependent">Dependent</button>
        <button data-role="Follower">Follower</button>
        <button data-role="Partner">Partner</button>
        <button data-role="Leader">Leader</button>
        <button data-role="Resister">Resister</button>
      </div>
    </div>
  </div>

  <div class="card random-mode">
    <h2 data-i18n="randMode">🔀 Modo Aleatório</h2>
    <button id="audioToggleBtn" onclick="toggleAudio()">🔊 Audio: ON</button>
    
    <div style="display:flex; justify-content:center; gap:5px; margin-bottom:10px;">
      <button onclick="prevRandom()" data-i18n="btnPrev">⬅️ Voltar</button>
      <button onclick="nextRandom()" data-i18n="btnNext">Avançar ➡️</button>
    </div>

    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px;">
      <button id="toggleRandomBtn" onclick="toggleRandom()">Iniciar</button>
      <label data-i18n="minTime">Tempo (s):</label>
      <input id="minInterval" type="number" min="1" value="5" style="width:50px" />
    </div>

    <div style="display:flex; justify-content:center; gap:5px;">
      <button onclick="exportCSV()" data-i18n="btnExport">📥 CSV</button>
      <button id="recordToggleBtn" data-i18n="btnRec">🎥 Gravar</button>
    </div>
  </div>
</div>

<div class="preview-card">
  <p style="text-align: center;"><a href="tela.html" target="_blank" data-i18n="openTab" style="color:#00BFFF">🔗 Abrir tela de projeção</a></p>
  <iframe id="previewIframe" src="about:blank"></iframe>
</div>
<script>
  const peer = new Peer(); 
  let conn = null;
  const bc = new BroadcastChannel("improvisacao");
  const roles = ["Dependent", "Follower", "Partner", "Leader", "Resister"];
  
  let intervalId = null;
  let isRandomRunning = false;
  let currentLang = 'pt';
  let isAudioEnabled = true;

  let leaderSide = "left";
  let leaderRoundsLeft = 3;
  let nonLeaderIndex = 0;
  const allNonLeaderRoles = ["Dependent", "Follower", "Partner", "Resister"];
  let history = [];

  const uiI18n = {
    pt: {
      title: "Painel de Controle", part1: "Participante 1:", part2: "Participante 2:",
      insertName: "inserir nome", randMode: "🔀 Modo Aleatório", btnPrev: "⬅️ Voltar",
      btnNext: "Avançar ➡️", btnStart: "Iniciar", btnStop: "Parar", minTime: "Tempo (s):",
      btnExport: "📥 CSV", btnRec: "🎥 Gravar", openTab: "🔗 Abrir tela de projeção",
      audioOn: "🔊 Áudio: LIGADO", audioOff: "🔇 Áudio: DESLIGADO",
      roles: { 
        "Dependent": "Dependente", "Follower": "Seguidor", "Partner": "Parceiro", "Leader": "Líder", "Resister": "Resistente" 
      },
      descriptions: {
        "Dependent": "Assume o papel de seguidor exclusivamente e nunca de líder.",
        "Follower": "Assume o papel de seguidor mais prontamente que o de líder.",
        "Partner": "Assume os papéis de líder e seguidor de forma igualitária.",
        "Leader": "Assume o papel de líder mais prontamente que o de seguidor.",
        "Resister": "Tenta evadir ou destruir qualquer relação líder-seguidor."
      }
    },
    en: {
      title: "Control Panel", part1: "Participant 1:", part2: "Participant 2:",
      insertName: "insert name", randMode: "🔀 Random Mode", btnPrev: "⬅️ Back",
      btnNext: "Next ➡️", btnStart: "Start", btnStop: "Stop", minTime: "Time (s):",
      btnExport: "📥 CSV", btnRec: "🎥 Record", openTab: "🔗 Open projection screen",
      audioOn: "🔊 Audio: ON", audioOff: "🔇 Audio: OFF",
      roles: { 
        "Dependent": "Dependent", "Follower": "Follower", "Partner": "Partner", "Leader": "Leader", "Resister": "Resister" 
      },
      descriptions: {
        "Dependent": "Takes the follower role exclusively and never the leader.",
        "Follower": "More readily takes the follower role than the leader.",
        "Partner": "Assumes leader and follower roles equally.",
        "Leader": "More readily takes the leader role than the follower.",
        "Resister": "Attempts to evade or destroy any leader-follower relationship."
      }
    }
  };

  // --- CONEXÃO ---
  document.getElementById('target-id').addEventListener('input', (e) => {
    if (e.target.value.length === 4) connectToScreen();
  });

  function connectToScreen() {
    const id = document.getElementById('target-id').value;
    const statusText = document.getElementById('login-status');
    statusText.textContent = "Conectando...";
    conn = peer.connect(id);
    conn.on('open', () => {
      statusText.textContent = "Conectado!";
      document.getElementById('previewIframe').src = "tela.html?preview=true&mute=true";
      setTimeout(() => { document.getElementById('lock-screen').style.display = 'none'; }, 600);
    });
    conn.on('error', () => { statusText.textContent = "Erro!"; document.getElementById('target-id').value = ""; });
  }

  function sendData(data) {
    if (conn && conn.open) conn.send(data);
    bc.postMessage(data);
  }

  // --- LÓGICA DE PAPÉIS ---
  function updateRole(side, value, broadcast = true) {
    const role = roles[value];
    const translatedName = uiI18n[currentLang].roles[role];
    const translatedDesc = uiI18n[currentLang].descriptions[role];

    document.getElementById(`${side}RoleLabel`).textContent = translatedName;
    document.getElementById(`${side}RoleSlider`).value = value;
    
    const btns = document.getElementById(`${side}RoleButtons`).children;
    for (let btn of btns) {
      // Traduz o texto do botão individualmente
      const btnRole = btn.dataset.role;
      btn.textContent = uiI18n[currentLang].roles[btnRole];
      // Destaca o selecionado
      btn.style.backgroundColor = (btnRole === role) ? '#27ae60' : '#444';
    }

    if (broadcast) {
      sendData({ [side]: role, [`${side}Desc`]: translatedDesc });
    }
  }

  // --- TRADUÇÃO ---
  function applyLang() {
    // 1. Traduz elementos com data-i18n
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (uiI18n[currentLang][key]) el.textContent = uiI18n[currentLang][key];
    });

    // 2. Traduz placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      el.placeholder = uiI18n[currentLang][key];
    });

    // 3. Atualiza botão de Idioma
    const langBtn = document.getElementById('langToggleBtn');
    langBtn.textContent = currentLang.toUpperCase();
    langBtn.className = currentLang === 'pt' ? 'btn-pt' : 'btn-en';

    // 4. Atualiza botões de estado (Áudio e Iniciar/Parar)
    document.getElementById('audioToggleBtn').textContent = isAudioEnabled ? uiI18n[currentLang].audioOn : uiI18n[currentLang].audioOff;
    document.getElementById('toggleRandomBtn').textContent = isRandomRunning ? uiI18n[currentLang].btnStop : uiI18n[currentLang].btnStart;

    // 5. Atualiza todos os labels e botões de perfil
    updateRole('left', document.getElementById('leftRoleSlider').value, false);
    updateRole('right', document.getElementById('rightRoleSlider').value, false);
    
    // 6. Envia o idioma para a tela (para sincronizar voz)
    sendData({ lang: currentLang });
  }

  function toggleLang() { 
    currentLang = currentLang === 'pt' ? 'en' : 'pt'; 
    applyLang(); 
  }

  // --- OUTRAS FUNÇÕES ---
  function toggleAudio() {
    isAudioEnabled = !isAudioEnabled;
    const btn = document.getElementById('audioToggleBtn');
    btn.classList.toggle('muted', !isAudioEnabled);
    applyLang();
    sendData({ audioEnabled: isAudioEnabled });
  }

  function generateNextRoles() {
    const currentLeft = roles[document.getElementById('leftRoleSlider').value];
    const currentRight = roles[document.getElementById('rightRoleSlider').value];
    history.push({ left: currentLeft, right: currentRight });
    if (history.length > 50) history.shift();

    let lR, rR;
    if (leaderSide === "left") {
      lR = "Leader";
      rR = allNonLeaderRoles[nonLeaderIndex % 4];
    } else {
      rR = "Leader";
      lR = allNonLeaderRoles[nonLeaderIndex % 4];
    }
    nonLeaderIndex++;
    leaderRoundsLeft--;
    if (leaderRoundsLeft <= 0) {
      leaderSide = (leaderSide === "left") ? "right" : "left";
      leaderRoundsLeft = 3;
      nonLeaderIndex = 0;
    }
    updateRole('left', roles.indexOf(lR));
    updateRole('right', roles.indexOf(rR));
  }

  function nextRandom() {
    if (isRandomRunning) { clearTimeout(intervalId); generateNextRoles(); startRandomLoop(); } 
    else { generateNextRoles(); }
  }

  function prevRandom() {
    if (history.length > 0) {
      const lastState = history.pop();
      updateRole('left', roles.indexOf(lastState.left));
      updateRole('right', roles.indexOf(lastState.right));
      if (isRandomRunning) { clearTimeout(intervalId); startRandomLoop(); }
    }
  }

  function startRandomLoop() {
    const time = document.getElementById('minInterval').value * 1000;
    intervalId = setTimeout(() => { generateNextRoles(); startRandomLoop(); }, time);
  }

  function toggleRandom() {
    isRandomRunning = !isRandomRunning;
    if (isRandomRunning) { generateNextRoles(); startRandomLoop(); } 
    else { clearTimeout(intervalId); }
    applyLang();
  }

  // Listeners
  document.getElementById('leftRoleSlider').oninput = (e) => updateRole('left', e.target.value);
  document.getElementById('rightRoleSlider').oninput = (e) => updateRole('right', e.target.value);
  document.getElementById('leftRoleButtons').onclick = e => e.target.dataset.role && updateRole('left', roles.indexOf(e.target.dataset.role));
  document.getElementById('rightRoleButtons').onclick = e => e.target.dataset.role && updateRole('right', roles.indexOf(e.target.dataset.role));
  document.getElementById('leftUpdateBtn').onclick = () => sendData({ leftName: document.getElementById('leftNameInput').value });
  document.getElementById('rightUpdateBtn').onclick = () => sendData({ rightName: document.getElementById('rightNameInput').value });

  applyLang();
</script>
</body>
</html>
