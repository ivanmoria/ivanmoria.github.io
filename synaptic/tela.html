<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Projeção – Improvisação Musical</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    .container { display: flex; height: 100vh; width: 100vw; background-color: #000; }
    
    .participant { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      transition: background-color 0.8s ease; 
      background-color: #000; 
      padding: 20px;
      box-sizing: border-box;
    }
    
    .left { border-right: 2px solid #222; }
    
    .role { 
      font-size: 6vw; 
      font-weight: 800; 
      text-transform: uppercase; 
      text-align: center; 
      min-height: 1.2em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    .description { 
      font-size: 1.8vw; 
      text-align: center; 
      max-width: 80%;
      min-height: 3.5em; 
      opacity: 0.9;
      line-height: 1.4;
      font-weight: 400;
    }
    
    .name { 
      font-size: 2.2vw; 
      text-align: center; 
      opacity: 0.7; 
      margin-top: 40px; 
      font-weight: 300;
      text-transform: none;
    }
    
    #peer-info { 
      position: absolute; 
      top: 10px; 
      left: 10px; 
      z-index: 1000; 
      background: rgba(0,0,0,0.8); 
      padding: 12px 20px; 
      border-radius: 8px; 
      border: 1px solid #333; 
      font-size: 1.1em; 
    }
    
    body.is-preview #peer-info { display: none; }
  </style>
</head>
<body>

  <div id="peer-info">
    ID: <strong id="my-id" style="color: #2ecc71;">...</strong>
  </div>

  <main class="container">
    <section class="participant left" id="left-participant">
      <div class="role" id="left-role"></div>
      <div class="description" id="left-description"></div>
      <div class="name" id="left-name"></div>
    </section>
    
    <section class="participant right" id="right-participant">
      <div class="role" id="right-role"></div>
      <div class="description" id="right-description"></div>
      <div class="name" id="right-name"></div>
    </section>
  </main>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('preview')) document.body.classList.add('is-preview');

    const bc = new BroadcastChannel("improvisacao");
    let masterAudioEnabled = !urlParams.has('mute');
    let currentLang = 'pt';
    let initialized = false; 

    // --- FILA DE ÁUDIO (PARA NÃO ATROPELAR) ---
    let speechQueue = [];
    let isSpeaking = false;

    function addToQueue(text) {
      speechQueue.push(text);
      processQueue();
    }

    function processQueue() {
      // Se já estiver falando ou fila vazia, não faz nada
      if (isSpeaking || speechQueue.length === 0) return;

      isSpeaking = true;
      const text = speechQueue.shift();
      
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = currentLang === 'pt' ? 'pt-BR' : 'en-US';
      msg.rate = 1.1;

      msg.onend = () => {
        isSpeaking = false;
        processQueue(); // Tenta processar o próximo da fila
      };

      msg.onerror = () => {
        isSpeaking = false;
        processQueue();
      };

      window.speechSynthesis.speak(msg);
    }

    // --- COMUNICAÇÃO ---
    if (!urlParams.has('preview')) {
        const numericId = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer(numericId);
        peer.on('open', (id) => { document.getElementById('my-id').textContent = id; });
        peer.on('connection', (conn) => {
            conn.on('data', (data) => { 
              initialized = true; 
              handleData(data); 
            });
        });
    }

    bc.onmessage = (event) => { 
        if(event.data !== "ready") {
            initialized = true; 
            handleData(event.data); 
        }
    };

    // --- DICIONÁRIOS ---
    const i18n = {
      en: { roles: { "Dependent": "Dependent", "Follower": "Follower", "Partner": "Partner", "Leader": "Leader", "Resister": "Resister" } },
      pt: { roles: { "Dependent": "Dependente", "Follower": "Seguidor", "Partner": "Parceiro", "Leader": "Líder", "Resister": "Resistente" } }
    };
    
    const colors = { 
      "Dependent": "#1E90FF", 
      "Follower": "#32CD32", 
      "Partner": "#FFD700", 
      "Leader": "#FF4500", 
      "Resister": "#8B008B" 
    };

    // --- LÓGICA DE ATUALIZAÇÃO ---
    function handleData(data) {
      if (!data) return;
      
      if (data.audioEnabled !== undefined) masterAudioEnabled = data.audioEnabled;
      if (data.lang) currentLang = data.lang;
      
      let changedLeftText = null;
      let changedRightText = null;

      // Processa Participante Esquerdo
      if (data.left) {
        const elRole = document.getElementById(`left-role`);
        const translatedRole = i18n[currentLang].roles[data.left] || data.left;
        
        if (elRole.textContent !== translatedRole.toUpperCase()) {
          updateUI('left', data.left, data.leftDesc);
          changedLeftText = `1. ${translatedRole}`;
        }
      }

      // Processa Participante Direito
      if (data.right) {
        const elRole = document.getElementById(`right-role`);
        const translatedRole = i18n[currentLang].roles[data.right] || data.right;
        
        if (elRole.textContent !== translatedRole.toUpperCase()) {
          updateUI('right', data.right, data.rightDesc);
          changedRightText = `2. ${translatedRole}`;
        }
      }

      // Nomes (sempre atualiza)
      if (data.leftName !== undefined) document.getElementById('left-name').textContent = data.leftName;
      if (data.rightName !== undefined) document.getElementById('right-name').textContent = data.rightName;

      // Gerencia a fala em ordem (1 depois 2)
      if (initialized && masterAudioEnabled && !urlParams.has('mute')) {
          if (changedLeftText) addToQueue(changedLeftText);
          if (changedRightText) addToQueue(changedRightText);
      }
    }

    function updateUI(side, role, desc) {
      const translatedRole = i18n[currentLang].roles[role] || role;
      const elRole = document.getElementById(`${side}-role`);
      const elDesc = document.getElementById(`${side}-description`);
      const elPart = document.getElementById(`${side}-participant`);
      
      elRole.textContent = translatedRole.toUpperCase();
      elDesc.textContent = desc || ""; 
      elPart.style.backgroundColor = colors[role] || "#000";
    }

    // Avisa ao controle que a tela está pronta para receber dados
    bc.postMessage("ready");
  </script>
</body>
</html>
