<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeção – Improvisação Musical</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    html, body { 
      margin: 0; padding: 0; height: 100%; 
      background-color: #000; color: white; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      overflow: hidden; 
      -webkit-tap-highlight-color: transparent; /* Remove o brilho de toque do iPhone */
    }
    
    .container { 
      display: flex; height: 100vh; width: 100vw; 
      background-color: #000; transition: opacity 0.8s ease; 
      opacity: 0; pointer-events: none;
    }
    
    body.is-ready .container { opacity: 1; pointer-events: auto; }
    
    .participant { 
      flex: 1; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; 
      transition: background-color 0.8s ease; 
      background-color: #000; padding: 20px; 
      box-sizing: border-box; text-align: center;
    }
    
    .left { border-right: 2px solid rgba(255,255,255,0.1); }
    
    .role { font-size: 6vw; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .description { font-size: 1.8vw; max-width: 80%; min-height: 3.5em; opacity: 0.9; line-height: 1.4; }
    .name { font-size: 2.2vw; opacity: 0.7; margin-top: 40px; }

    /* --- PAINEL DE CONEXÃO (BALÃO) --- */
    #peer-info { 
      position: absolute; top: 15px; right: 15px; z-index: 2000; 
      background: rgba(35, 35, 35, 0.98); padding: 12px 20px; 
      border-radius: 50px; border: 1px solid #444; 
      display: flex; gap: 12px; align-items: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      overflow: hidden;
      min-width: 0; min-height: 0;
    }

    /* ÍCONE DA ENGRENAGEM */
    #peer-info::before {
      content: "⚙️";
      display: none;
      font-size: 24px;
      line-height: 1;
    }

    /* --- ESTADO CONECTADO E MINIMIZADO --- */
    /* No iPhone, forçamos o tamanho exato e escondemos os filhos via display:none */
    body.is-connected #peer-info:not(.expanded) {
      width: 48px !important;
      height: 48px !important;
      padding: 0 !important;
      border-radius: 50% !important;
      justify-content: center !important;
      opacity: 0.5;
      border-color: #2ecc71;
    }

    body.is-connected #peer-info:not(.expanded)::before {
      display: block;
    }

    /* Regra crítica para o iPhone: se não estiver expandido, esconde tudo dentro */
    body.is-connected #peer-info:not(.expanded) > * {
      display: none !important;
    }

/* --- EXPANSÃO --- */
    /* Apenas para Computadores (Mouse) */
    @media (min-width: 769px) {
      body.is-connected #peer-info:hover {
        width: auto !important; height: auto !important;
        padding: 10px 20px !important;
        border-radius: 50px !important; opacity: 1;
      }
      body.is-connected #peer-info:hover > * { display: flex !important; }
      body.is-connected #peer-info:hover::before { display: none !important; }
    }

    /* Estado Expandido (Celular e Clique no PC) */
    #peer-info.expanded {
      width: auto !important;
      max-width: 92vw !important;
      height: auto !important;
      padding: 12px 20px !important;
      border-radius: 20px !important;
      opacity: 1 !important;
      display: flex !important;
    }
    #peer-info.expanded > * { display: flex !important; }
    #peer-info.expanded::before { display: none !important; }

    /* Estilos internos */
    #peer-id-input { background: #000; border: 1px solid #555; color: #2ecc71; font-weight: bold; padding: 6px; border-radius: 6px; width: 60px; text-align: center; -webkit-appearance: none; }
    #btn-connect { background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; -webkit-appearance: none; }
    #btn-connect.connected { background: transparent; border: 1px solid #2ecc71; color: #2ecc71; }
    #btn-mute-local { background: rgba(255, 255, 255, 0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .role { font-size: 12vw; }
      .description { font-size: 5vw; }
      .name { font-size: 6vw; }

      body:not(.is-connected) #peer-info {
        top: auto; bottom: 20px; left: 15px; right: 15px;
        max-width: none; border-radius: 15px; justify-content: space-between;
      }
    }
    body.is-preview #peer-info { display: none !important; }
</style>


</head><body class="">

<div id="peer-info" onclick="toggleMobileMenu(event)">
  
  <button id="btn-mute-local" onclick="event.stopPropagation(); toggleLocalMute()" title="Mute Local">🔊</button>
  <button id="btn-lang-local" onclick="event.stopPropagation(); toggleLocalLang()" style="background: #333; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem;">PT</button>
  
  <span style="font-size: 0.8rem; color: #aaa; white-space: nowrap;">ID:</span>
  <input type="text" id="peer-id-input" maxlength="4" onclick="event.stopPropagation()">
  <button id="btn-connect" onclick="event.stopPropagation(); startConnection()">Conectar</button>
</div>

<main class="container">
  <section class="participant left" id="left-participant">
    <div class="role" id="left-role"></div>
    <div class="description" id="left-description"></div>
    <div class="name" id="left-name"></div>
  </section>
  
  <section class="participant right" id="right-participant">
    <div class="role" id="right-role"></div>
    <div class="description" id="right-description"></div>
    <div class="name" id="right-name"></div>
  </section>
</main>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const isPreview = urlParams.has('preview');
    if (isPreview) document.body.classList.add('is-preview');

    const bc = new BroadcastChannel("improvisacao");
    let masterAudioEnabled = !urlParams.has('mute');
    let localMute = false;
    let currentLang = 'pt';
    let isScreenActive = false; 
    let peer = null;
    let myID = "";

    // Configuração inicial do ID
    const inputEl = document.getElementById('peer-id-input');
    myID = urlParams.get('id') || Math.floor(1000 + Math.random() * 9000).toString();
    inputEl.value = myID;

    const i18n = {
      pt: {
        roles: { "Dependent": "Dependente", "Follower": "Seguidor", "Partner": "Parceiro", "Leader": "Líder", "Resister": "Resistente" },
        descriptions: { "Dependent": "Assume o papel de seguidor exclusivamente e nunca de líder.", "Follower": "Assume o papel de seguidor mais prontamente que o de líder.", "Partner": "Assume os papéis de líder e seguidor de forma igualitária.", "Leader": "Assume o papel de líder mais prontamente que o de seguidor.", "Resister": "Tenta evadir ou destruir qualquer relação líder-seguidor." }
      },
      en: {
        roles: { "Dependent": "Dependent", "Follower": "Follower", "Partner": "Partner", "Leader": "Leader", "Resister": "Resister" },
        descriptions: { "Dependent": "Takes the follower role exclusively and never the leader.", "Follower": "More readily takes the follower role than the leader.", "Partner": "Assumes leader and follower roles equally.", "Leader": "More readily takes the leader role than the follower.", "Resister": "Attempts to evade or destroy any leader-follower relationship." }
      }
    };

    const colors = { "Dependent": "#1E90FF", "Follower": "#32CD32", "Partner": "#FFD700", "Leader": "#FF4500", "Resister": "#8B008B" };


let menuTimeout = null; // Variável global para controlar o tempo

    function toggleMobileMenu(e) {
      if (e) e.stopPropagation();
      
      if (document.body.classList.contains('is-connected')) {
        const info = document.getElementById('peer-info');
        info.classList.toggle('expanded');

        // Se o menu abriu, inicia a contagem para fechar sozinho
        if (info.classList.contains('expanded')) {
          resetMenuTimer();
        }
      }
    }

    function resetMenuTimer() {
      // Limpa qualquer contagem anterior para não fechar antes da hora
      clearTimeout(menuTimeout);
      
      // Define para fechar em 6 segundos (3000ms)
      menuTimeout = setTimeout(() => {
        const info = document.getElementById('peer-info');
        if (info) info.classList.remove('expanded');
      }, 3000);
    }

    // Adicione isso para fechar o temporizador se você clicar fora
    document.addEventListener('click', function(event) {
      const info = document.getElementById('peer-info');
      if (info.classList.contains('expanded')) {
        info.classList.remove('expanded');
        clearTimeout(menuTimeout);
      }
    });

    async function startConnection() {
      myID = document.getElementById('peer-id-input').value;
      
      // Desbloqueia áudio e fecha teclado no iPhone
      const unlockAudio = new SpeechSynthesisUtterance(" ");
      window.speechSynthesis.speak(unlockAudio);
      document.activeElement.blur(); 

      if (peer) peer.destroy();
      
      let connectionSuccess = false;
      let attempt = 0;
      const btn = document.getElementById('btn-connect');
      btn.textContent = "Conec...";

      while (!connectionSuccess && attempt < 5) {
        const targetId = attempt === 0 ? myID : `${myID}-${attempt}`;
        const tempPeer = new Peer(targetId);
        
        const result = await new Promise((resolve) => {
          tempPeer.on('open', () => { peer = tempPeer; connectionSuccess = true; resolve('success'); });
          tempPeer.on('error', () => { tempPeer.destroy(); resolve('fail'); });
          setTimeout(() => resolve('fail'), 1500);
        });
        if (result === 'success') break;
        attempt++;
      }

      if (peer) {
        btn.textContent = "ONLINE";
        btn.classList.add('connected');
        document.body.classList.add('is-connected');
        
        // Inicia como engrenagem (fechado) após conectar
        document.getElementById('peer-info').classList.remove('expanded');

        peer.on('connection', (conn) => {
          conn.on('data', (data) => handleData(data, false));
        });
      } else {
        btn.textContent = "Erro";
      }
    }

    function toggleLocalMute() {
      localMute = !localMute;
      const btn = document.getElementById('btn-mute-local');
      btn.textContent = localMute ? "🔇" : "🔊";
      btn.classList.toggle('active', localMute);
      if(localMute) window.speechSynthesis.cancel();
    }

    function toggleLocalLang() {
      currentLang = currentLang === 'pt' ? 'en' : 'pt';
      document.getElementById('btn-lang-local').textContent = currentLang.toUpperCase();
      const leftRaw = document.getElementById('left-role').dataset.rawRole;
      const rightRaw = document.getElementById('right-role').dataset.rawRole;
      if (leftRaw) updateUI('left', leftRaw);
      if (rightRaw) updateUI('right', rightRaw);
    }

    async function startConnection() {
      myID = document.getElementById('peer-id-input').value;
      
      // Desbloqueia áudio no mobile
      const unlockAudio = new SpeechSynthesisUtterance(" ");
      window.speechSynthesis.speak(unlockAudio);

      // Opcional: Tenta entrar em tela cheia no celular
      if (!isPreview && document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
      
      if (peer) peer.destroy();
      
      let connectionSuccess = false;
      let attempt = 0;
      const btn = document.getElementById('btn-connect');
      btn.textContent = "Conec...";

      while (!connectionSuccess && attempt < 5) {
        const targetId = attempt === 0 ? myID : `${myID}-${attempt}`;
        const tempPeer = new Peer(targetId);
        
        const result = await new Promise((resolve) => {
          tempPeer.on('open', () => { peer = tempPeer; connectionSuccess = true; resolve('success'); });
          tempPeer.on('error', () => { tempPeer.destroy(); resolve('fail'); });
          setTimeout(() => resolve('fail'), 1500);
        });
        if (result === 'success') break;
        attempt++;
      }

      if (peer) {
        btn.textContent = "ONLINE";
        btn.classList.add('connected');
        document.body.classList.add('is-connected');
        
        // Minimiza o menu após 2 segundos
        setTimeout(() => {
          document.getElementById('peer-info').classList.remove('expanded');
        }, 2000);

        peer.on('connection', (conn) => {
          conn.on('data', (data) => handleData(data, false));
        });
      } else {
        btn.textContent = "Erro";
      }
    }

    // --- TRATAMENTO DE DADOS ---

    let voiceBuffer = { left: null, right: null };
    let voiceTimeout = null;
function handleData(data, fromBroadcast = false) {
      if (!data) return;
      if (data.targetID !== myID) return;

      if (!isScreenActive) {
        isScreenActive = true;
        document.body.classList.add('is-ready');
      }

      if (data.audioEnabled !== undefined) masterAudioEnabled = data.audioEnabled;
      if (data.lang !== undefined) currentLang = data.lang;

      let hasChange = false;
      
      // Captura os nomes atuais ou define padrão "1" e "2"
      const nameLeft = data.leftName || document.getElementById('left-name').textContent || "1";
      const nameRight = data.rightName || document.getElementById('right-name').textContent || "2";

      if (data.left) {
        const elRole = document.getElementById(`left-role`);
        if (elRole.dataset.rawRole !== data.left) {
          updateUI('left', data.left);
          // Usa o nome definido ou o número 1
          voiceBuffer.left = `${nameLeft}, ${i18n[currentLang].roles[data.left]}`;
          hasChange = true;
        }
      }
      
      if (data.right) {
        const elRole = document.getElementById(`right-role`);
        if (elRole.dataset.rawRole !== data.right) {
          updateUI('right', data.right);
          // Usa o nome definido ou o número 2
          voiceBuffer.right = `${nameRight}, ${i18n[currentLang].roles[data.right]}`;
          hasChange = true;
        }
      }

      // Atualiza os nomes visualmente na tela
      if (data.leftName !== undefined) document.getElementById('left-name').textContent = data.leftName;
      if (data.rightName !== undefined) document.getElementById('right-name').textContent = data.rightName;

// Execução da Voz
      if (hasChange && masterAudioEnabled && !urlParams.has('mute') && !localMute) {
        clearTimeout(voiceTimeout);
        voiceTimeout = setTimeout(() => {
          const connector = currentLang === 'pt' ? ' e ' : ' and ';
          let phrase = "";
          
          if (voiceBuffer.left && voiceBuffer.right) {
            phrase = `${voiceBuffer.left}${connector}${voiceBuffer.right}`;
          } else if (voiceBuffer.left) {
            phrase = voiceBuffer.left;
          } else if (voiceBuffer.right) {
            phrase = voiceBuffer.right;
          }
          
          if (phrase) {
            window.speechSynthesis.cancel();
            
            // Melhora a pronúncia: troca termos que o robô fala errado
            if (currentLang === 'pt') {
                phrase = phrase.replace(/Resister/g, "Resistente");
                phrase = phrase.replace(/Follower/g, "Seguidor");
            }

            const msg = new SpeechSynthesisUtterance(phrase);
            
            // BUSCA PELAS MELHORES VOZES DISPONÍVEIS
            const voices = window.speechSynthesis.getVoices();
            if (currentLang === 'pt') {
                msg.lang = 'pt-BR';
                // Tenta encontrar vozes premium (Google ou Microsoft)
                const melhorVoz = voices.find(v => v.lang.includes('pt-BR') && (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Daniel') || v.name.includes('Maria')));
                if (melhorVoz) msg.voice = melhorVoz;
            } else {
                msg.lang = 'en-US';
                const melhorVozEn = voices.find(v => v.lang.includes('en-US') && (v.name.includes('Google') || v.name.includes('Samantha')));
                if (melhorVozEn) msg.voice = melhorVozEn;
            }

            msg.rate = 1.2;  // Velocidade mais ágil
            msg.pitch = 1.0; // Tom natural
            msg.volume = 1.0;

            window.speechSynthesis.speak(msg);
          }
          voiceBuffer = { left: null, right: null };
        }, 150);
      }
    }
    function updateUI(side, role) {
      const elRole = document.getElementById(`${side}-role`);
      elRole.textContent = i18n[currentLang].roles[role].toUpperCase();
      elRole.dataset.rawRole = role;
      document.getElementById(`${side}-description`).textContent = i18n[currentLang].descriptions[role]; 
      document.getElementById(`${side}-participant`).style.backgroundColor = colors[role] || "#000";
    }

    bc.onmessage = (event) => { 
      if(event.data !== "ready") handleData(event.data, true);
    };
    bc.postMessage("ready");

    if (isPreview) startConnection();
</script>
</body>
</html>
