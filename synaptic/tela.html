<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Projeção – Improvisação Musical</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background-color: #000;
      color: white;
      font-family: sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .participant {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: background-color 0.5s;
    }

    .left { border-right: 3px solid white; }

    .role {
      font-size: 4em;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
      text-align: center;
    }

    .description {
      font-size: 1.5em;
      font-style: normal;
      margin-bottom: 20px;
      text-align: center;
      color: white;
      padding: 0 40px;
    }

    .name {
      font-size: 2em;
      text-align: center;
    }

    .control-link {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 999;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid white;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 0.9em;
      color: white;
      text-decoration: none;
      transition: background 0.3s;
    }

    .control-link:hover { background: rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body>

  <a class="control-link" href="controle.html" target="_blank" title="Abrir painel de controle">⚙️</a>

  <div class="container">
    <div class="participant left" id="left-participant">
      <div class="role" id="left-role"></div>
      <div class="description" id="left-description"></div>
      <div class="name" id="left-name">Participant 1</div>
    </div>
    <div class="participant right" id="right-participant">
      <div class="role" id="right-role"></div>
      <div class="description" id="right-description"></div>
      <div class="name" id="right-name">Participant 2</div>
    </div>
  </div>

  <script>


    const channel = new BroadcastChannel("improvisacao");

        let currentLang = 'pt';
        let currentLeftRole = "";
        let currentRightRole = "";
        let isDefaultLeft = true;
        let isDefaultRight = true;

        const colors = {
          "Dependent": "#1E90FF",
          "Follower": "#32CD32",
          "Partner": "#FFD700",
          "Leader": "#FF4500",
          "Resister": "#8B008B"
        };

        const i18n = {
          en: {
            names: { left: "Participant 1", right: "Participant 2" },
            roles: {
              "Dependent": "DEPENDENT",
              "Follower": "FOLLOWER",
              "Partner": "PARTNER",
              "Leader": "LEADER",
              "Resister": "RESISTER"
            },
            descriptions: {
              "Dependent": "Takes the follower role exclusively and never the leader. Depends entirely on the partner.",
              "Follower": "More readily takes the follower role than the leader. Responsibility for musical elements is largely given to the partner.",
              "Partner": "Assumes leader and follower roles equally. Shares responsibility for musical elements with the partner.",
              "Leader": "More readily takes the leader role than the follower. Attempts to influence the improvisation by directing aspects of the music.",
              "Resister": "Attempts to evade or destroy any leader-follower relationship. Does not influence improvisation or participate in joint interactions."
            }
          },
          pt: {
            names: { left: "Participante 1", right: "Participante 2" },
            roles: {
              "Dependent": "DEPENDENTE",
              "Follower": "SEGUIDOR",
              "Partner": "PARCEIRO",
              "Leader": "LÍDER",
              "Resister": "RESISTENTE"
            },
            descriptions: {
              "Dependent": "Assume o papel de seguidor exclusivamente e nunca de líder. Depende inteiramente do parceiro.",
              "Follower": "Assume o papel de seguidor mais prontamente que o de líder. A responsabilidade pelos elementos musicais é em grande parte do parceiro.",
              "Partner": "Assume os papéis de líder e seguidor de forma igualitária. Compartilha a responsabilidade pelos elementos musicais com o parceiro.",
              "Leader": "Assume o papel de líder mais prontamente que o de seguidor. Tenta influenciar a improvisação direcionando aspectos da música.",
              "Resister": "Tenta evadir ou destruir qualquer relação líder-seguidor. Não influencia a improvisação nem participa de interações conjuntas."
            }
          }
        };

        function setRole(side, role) {
          if(!role) return;
          const roleDiv = document.getElementById(`${side}-role`);
          const partDiv = document.getElementById(`${side}-participant`);
          const descDiv = document.getElementById(`${side}-description`);

          roleDiv.textContent = i18n[currentLang].roles[role];
          partDiv.style.backgroundColor = colors[role] || "#333";
          if (descDiv) descDiv.textContent = i18n[currentLang].descriptions[role] || "";
        }

        channel.onmessage = (event) => {
          const data = event.data;
          
          if (data.lang) {
            currentLang = data.lang;
            setRole('left', currentLeftRole);
            setRole('right', currentRightRole);
            
            // Atualiza os nomes caso ninguém tenha digitado um nome customizado
            if (isDefaultLeft) document.getElementById('left-name').textContent = i18n[currentLang].names.left;
            if (isDefaultRight) document.getElementById('right-name').textContent = i18n[currentLang].names.right;
          }

          if (data.left) {
            currentLeftRole = data.left;
            setRole('left', data.left);
          }
          if (data.right) {
            currentRightRole = data.right;
            setRole('right', data.right);
          }

          if (data.leftName !== undefined) {
            document.getElementById('left-name').textContent = data.leftName;
            // Verifica se é o nome padrão (em qualquer idioma). Se for, mantém como default.
            isDefaultLeft = (data.leftName === i18n['pt'].names.left || data.leftName === i18n['en'].names.left);
          }
          if (data.rightName !== undefined) {
            document.getElementById('right-name').textContent = data.rightName;
            isDefaultRight = (data.rightName === i18n['pt'].names.right || data.rightName === i18n['en'].names.right);
          }
        };
  </script>
</body>
</html>
