<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
  <meta name="description" content="Ivan Moriá Borges — pesquisador em Musicoterapia, Neurociências e Tecnologia">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d2b2b">
  <title>Ivan Moriá Borges Rodrigues</title>
  <link rel="icon" href="https://img.icons8.com/?size=100&id=30660&format=png&color=000000" type="image/x-icon">
  <link rel="apple-touch-icon" href="https://img.icons8.com/?size=100&id=30660&format=png&color=000000">
  <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Poiret+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: white; color: #333; }

    body, html {
      overflow: hidden;
      background: #2d2b2b;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0; display: block;
    }
    #canvas-container {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* ── Settings (theme + language) ─── */
    .settings-row {
      margin-top: 18px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.13);
      width: 100%; display: flex; flex-direction: column;
      gap: 10px;
    }
    .theme-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center;
    }
    .theme-label {
      font-family: 'Poiret One', cursive;
      font-size: 12px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
    }

    /* Planet button — nebula theme toggle */
    .planet-button {
      border: none; background: none; cursor: pointer;
      padding: 4px;
      transition: transform 0.3s ease;
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      position: relative;
      pointer-events: auto !important;
    }
    .planet-button:hover { transform: scale(1.15); }
    .planet-button:active { transform: scale(0.95); }

    .theme-switch { display: flex; direction: rtl; }
    #theme-checkbox { display: none; }
    #theme-checkbox + label {
      font-size: 1.7rem; height: 1em; width: 2.5em;
      border-radius: 0.25em; cursor: pointer;
      display: flex; justify-content: space-between;
      background: rgba(200,200,200,0.30); position: relative;
      transition: background 0.3s;
    }
    #theme-checkbox:checked + label { background: rgba(58,58,58,0.7); }
    #theme-checkbox + label:active  { transform: scale(1.4); transition: transform 0.15s; }
    #theme-checkbox + label div {
      width: 0.8em; height: 0.8em; border-radius: inherit;
      position: absolute; top: 0.1em; left: 0.1em; z-index: 10;
      transition: 0.45s cubic-bezier(1,0.33,0.11,1.34); background: #f0f0f0;
    }
    #theme-checkbox:checked + label div { left: 1.6em; background: #212121; }
    #theme-checkbox + label span { display: flex; }
    #theme-checkbox + label svg { height: 1em; width: 1em; padding: 0.14em; box-sizing: border-box; }
    #theme-checkbox + label span:first-of-type { color: #444; }
    #theme-checkbox + label span:last-of-type  { color: #ccc; }

    /* ── Language toggle ─── */
    .language-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .lang-label {
      font-family: 'Poiret One', cursive;
      font-size: 11px; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
    }
    .lang-flags {
      display: flex; gap: 4px;
    }
    .lang-flag {
      font-size: 18px; border: none; background: none; cursor: pointer;
      padding: 2px 4px; border-radius: 4px;
      transition: transform 0.2s ease, background 0.2s ease;
      opacity: 0.6;
    }
    .lang-flag:hover { transform: scale(1.15); opacity: 1; }
    .lang-flag.active { opacity: 1; background: rgba(255,255,255,0.1); }

    /* ── Nav buttons — center ─── */
    .link-list {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center;
    }

    .link-btn {
      color: white;
      font-family: 'Poiret One', cursive;
      font-size: clamp(18px, 4vw, 25px);
      font-weight: 600; letter-spacing: 0.04em;
      border: none; background: none;
      padding: 8px 12px; cursor: pointer;
      transition: all 0.25s ease;
      display: block;
    }
    .link-btn::after, .link-btn::before {
      content: ''; width: 0; height: 2px;
      background: #ffffff; display: block; transition: width 0.45s ease;
    }
    .link-btn::before { margin-left: auto; }
    .link-btn:hover::after, .link-btn:hover::before { width: 100%; }
    .link-btn:hover { background: white; color: black; }
    .link-btn:hover::after, .link-btn:hover::before { background: #000; }

    /* ── Social icons with labels — two columns ─── */
    .social-grid {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 18px;
      min-width: 200px;
    }
    .social-grid-large {
      gap: 10px;
      margin-top: 20px;
    }
    .social-item {
      display: flex; align-items: center; gap: 12px;
    }
    .social-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.45s ease, background 0.22s ease;
      flex-shrink: 0;
    }
    .social-btn:hover { background: white; transform: rotate(360deg) scale(1.12); }
    .social-btn:hover svg { filter: invert(100%) sepia(0%) saturate(0%); }
    .social-label {
      font-family: 'Poiret One', cursive;
      font-size: clamp(11px, 2vw, 13px);
      color: rgba(255,255,255,0.7);
      transition: color 0.25s ease;
    }
    .social-item:hover .social-label {
      color: white;
    }
    .social-btn-lg {
      width: 48px; height: 48px;
    }

    /* ── Signature ─── */
    .signature-wrap {
      position: fixed; left: 50%;
      transform: translateX(-50%); z-index: 1000; white-space: nowrap;
    }
    .signature-wrap.signature-top {
      top: 20px;
    }
    .signature-wrap.signature-bottom {
      bottom: 20px;
    }
    .signature {
      font-family: "Rock Salt", cursive;
      font-size: clamp(13px, 3.5vw, 18px);
      color: rgba(255,255,255,0.84);
      white-space: nowrap; overflow: hidden;
      cursor: help;
      animation: typing 3.5s steps(20,end) forwards;
    }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink  { 50% { border-color: rgba(255,255,255,0.7); } }

    @media (max-height: 560px) {
      .link-btn { font-size: 16px; padding: 5px 10px; }
      .signature-wrap { bottom: 8px; }
    }
    @media (max-width: 400px) {
      .social-btn { width: 36px; height: 36px; border-width: 1.5px; }
      .social-row { gap: 8px; }
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <!-- Signature — bottom -->
  <div class="signature-wrap signature-bottom">
    <div class="signature" id="assinatura">Ivan Moriá Borges</div>
  </div>

  <!-- Theme toggle — top center -->
  <div class="signature-wrap signature-top">
    <button id="planet-toggle-top" class="planet-button" title="Click to toggle theme">
      <svg viewBox="0 0 80 80" width="40" height="40" xmlns="http://www.w3.org/2000/svg" class="planet-svg">
        <defs>
          <radialGradient id="nebulaGradient" cx="35%" cy="35%">
            <stop offset="0%" style="stop-color:#ff99ff;stop-opacity:1" />
            <stop offset="30%" style="stop-color:#dd55ff;stop-opacity:0.85" />
            <stop offset="60%" style="stop-color:#5588ff;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#1155ff;stop-opacity:0" />
          </radialGradient>
          <radialGradient id="nebulaGradient2" cx="50%" cy="50%">
            <stop offset="0%" style="stop-color:#ff77ff;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#3366ff;stop-opacity:0" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
            </feMerge>
          </filter>
          <style>
            @keyframes moonOrbit {
              from { transform: rotate(0deg); }
              to { transform: rotate(360deg); }
            }
            @keyframes nebulaPulse {
              0%, 100% { opacity: 0.7; }
              50% { opacity: 1; }
            }
            @keyframes nebulaSpin {
              from { transform: rotate(0deg); }
              to { transform: rotate(-180deg); }
            }
            .moon-container {
              animation: moonOrbit 6s linear infinite;
              transform-origin: 40px 40px;
            }
            .nebula-core {
              animation: nebulaPulse 3s ease-in-out infinite;
            }
            .nebula-ring {
              animation: nebulaSpin 8s linear infinite;
              transform-origin: 40px 40px;
            }
          </style>
        </defs>
        <circle cx="40" cy="40" r="32" fill="none" stroke="url(#nebulaGradient2)" stroke-width="6" filter="url(#glow)" opacity="0.5"/>
        <circle cx="40" cy="40" r="26" fill="url(#nebulaGradient)" class="nebula-core" filter="url(#glow)"/>
        <ellipse cx="40" cy="35" rx="22" ry="18" fill="none" stroke="#dd77ff" stroke-width="1.5" opacity="0.4" class="nebula-ring" filter="url(#glow2)"/>
        <ellipse cx="40" cy="45" rx="20" ry="20" fill="none" stroke="#6699ff" stroke-width="1" opacity="0.3" class="nebula-ring" filter="url(#glow2)"/>
        <g class="moon-container">
          <defs>
            <radialGradient id="moonGlow">
              <stop offset="0%" style="stop-color:#ffff88;stop-opacity:1" />
              <stop offset="70%" style="stop-color:#ffdd44;stop-opacity:0.8" />
              <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:0" />
            </radialGradient>
          </defs>
          <circle cx="40" cy="10" r="6" fill="url(#moonGlow)" opacity="1" filter="url(#glow)"/>
          <circle cx="40" cy="10" r="4" fill="#ffffcc" opacity="0.95" filter="url(#glow)"/>
          <circle cx="40" cy="10" r="2" fill="#ffffff" opacity="0.8"/>
        </g>
      </svg>
    </button>
  </div>

  <!-- Nav buttons + theme toggle — center column -->
  <div class="link-list">
    <button class="link-btn" onclick="window.location.href='apps.html'" data-pt="Apps" data-en="Apps" data-de="Apps" data-fr="Apps" data-ja="アプリ" data-tr="Uygulamalar">Apps</button>
    <button class="link-btn" onclick="window.location.href='index.html'" data-pt="Contato" data-en="Contact" data-de="Kontakt" data-fr="Contact" data-ja="お問い合わせ" data-tr="İletişim">Contato</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="script.js"></script>
</body>
</html>
