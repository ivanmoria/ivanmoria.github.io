</head>
<body>

<div id="touchControls2"  style="display: flex; align-items: center; gap: 20px; justify-content: center; padding: 10px 0;">
  <button type="button" onclick="location.reload()" title="Voltar à Configuração" 
          style="display: flex; align-items: center; gap: 6px; background: none; border: none; color: white; cursor: pointer;">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6a6 6 0 0 1-6 6 6 6 0 0 1-5.65-4H4.26a8 8 0 0 0 7.74 6 8 8 0 0 0 0-16z"/>
    </svg>
    Esc
  </button>

  <button type="button" onclick="togglePause()">
    Pause (P)
  </button>
  
</div>


   
<canvas id="gameCanvas" width="640" height="640"></canvas>
<div id="score" style="font-size: 30px; margin-top: -10px ;white-space: nowrap;">
    Score: 0 | Vidas: 0
  </div>
<div id="gameOverOverlay" role="alert" aria-live="assertive"></div>
<audio id="audioFundo" preload="auto"></audio>

<div id="touchControls" role="group"  style= "margin-top: 10px; "aria-label="Controles do jogo para toque">


  <button type="button" class="up" onclick="movePlayer('up')">W</button>
  <button type="button" class="left" onclick="movePlayer('left')">A</button>
  <button type="button" class="right" onclick="movePlayer('right')">D</button>
  <button type="button" class="down" onclick="movePlayer('down')">S</button>


</div>

<div id="startOverlay">
  <div style="margin-top: -10%; font-size:40px;">Escolha o modo (M):</div>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
<div class="mode-switch">
  <label class="switch">
    <input type="checkbox" id="modeToggle">
    <span class="slider"></span>
  </label>
  <span id="modeLabel">Normal</span>
</div>

</div>

  <div style="margin-top: 20px; font-size:40px;">Seguir Notas (H):</div>
  <div style="display: flex; gap: 20px; margin-bottom: 20px; justify-content: center;">
    <button class="note-mode-btn" onclick="setNoteMode('harmony')" style="background-color: #4CAF50; color: white; padding: 15px 30px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer;">🎼 Harmonia</button>
    <button class="note-mode-btn" onclick="setNoteMode('melody')" style="background-color: #555; color: white; padding: 15px 30px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer;">🎵 Melodia</button>
  </div>

  <div style="margin-top: 20px;font-size:40px;">Escolha a música:</div> 

  <div style="display: flex; gap: 10px; margin-bottom: 10px;">
    <button class="music-select" onclick="setMusic('musica1.mp3', 'layers1.csv')">Música 1</button>
    <button class="music-select" onclick="setMusic('musica2.mp3', 'layers2.csv')">Música 2</button>
  </div>
  <div style="display: flex; gap: 10px;">
    <button class="music-select" onclick="setMusic('musica3.mp3', 'layers3.csv')">Música 3</button>
    <button class="music-select" onclick="setMusic('musica4.mp3', 'layers4.csv')">Música 4</button>
  </div>

  <div id="customMusicSection" style="margin-top: 30px; display: block;">
    <div style="font-size:40px; margin-bottom: 15px;">Suas Músicas Customizadas:</div>
    <div id="customMusicList" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;"><!-- Músicas detectadas automaticamente -->
      <button class="music-select" onclick="setMusic('choro_fado.mp3', 'choro_fado_layers.csv');" style="background-color: #FF9800;">🎵 Choro Fado (83 BPM)</button>
      </div>
  </div>

  <div style="margin-top: 30px;">
    <div style="font-size: 18px; color: white; margin-bottom: 10px;">Carregar Música MP3:</div>
    <div style="display: flex; gap: 10px;">
      <button class="music-select" onclick="document.getElementById('customAudioInput').click()" style="background-color: #2196F3;">🔊 Carregar MP3</button>
    </div>
    <input type="file" id="customAudioInput" accept=".mp3,.wav,.ogg" style="display: none;" />
    <div id="audioLoadStatus" style="margin-top: 10px; color: white; font-size: 14px;"></div>
  </div>

  <div id="uploadProgress" style="display: none; margin-top: 20px; text-align: center; color: white;">
    <p>Processando <span id="fileName"></span>...</p>
    <div style="width: 200px; height: 10px; background: #333; margin: 10px auto; border-radius: 5px;">
      <div id="progressBar" style="width: 0%; height: 100%; background: #4CAF50; border-radius: 5px;"></div>
    </div>
  </div>

  <div id="startButtonContainer"></div><br><br>
  <!-- Assinatura -->
<footer style="text-align: center; margin-top: -5px; font-family: sans-serif; font-size: 14px; color: #555;">
  Desenvolvido por <strong>Ivan Moriá Borges</strong> — 
  <a href="https://ivanmoria.github.io" target="_blank" rel="noopener noreferrer">ivanmoria.github.io</a>
</footer>
</div>


  <!-- Core modules -->
  <script src="models/NoteMapping.js"></script>
  <script src="models/ChordDefinitions.js"></script>
  <script src="systems/AnimationSystem.js"></script>
  <script src="systems/SoundEffects.js"></script>
  <script src="systems/DifficultyManager.js"></script>
  <script src="systems/ScorePersistence.js"></script>
  <script src="processors/MusicParser.js"></script>
  <script src="processors/UploadProcessor.js"></script>

  <!-- Game -->
  <script src="scriptgame.js"></script>
  <script src="game.js"></script>

  <script>
    // Carregar áudio MP3 customizado
    document.getElementById('customAudioInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const audioUrl = URL.createObjectURL(file);
      const musicName = file.name.replace(/\.[^/.]+$/, ''); // Remove extension

      // Criar botão de música customizada
      const section = document.getElementById('customMusicSection');
      section.style.display = 'block';

      const button = document.createElement('button');
      button.className = 'music-select';
      button.style.backgroundColor = '#FF9800';
      button.textContent = `🎵 ${musicName}`;
      button.onclick = () => {
        // Usar o áudio customizado com um CSV genérico
        setMusic(audioUrl, 'layers1.csv'); // Use existing CSV for enemy spawning
        window.customAudioUrl = audioUrl;
      };

      document.getElementById('customMusicList').appendChild(button);
      document.getElementById('audioLoadStatus').textContent = `✅ Carregado: ${file.name}`;
      e.target.value = '';
    });

    document.getElementById('hiddenFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      document.getElementById('uploadProgress').style.display = 'block';
      document.getElementById('fileName').textContent = file.name;

      const result = await uploadProcessor.processUpload(file);

      document.getElementById('uploadProgress').style.display = 'none';
      e.target.value = '';

      if (result.success) {
        const track = result.data;
        addCustomMusicButton(track);
        alert(`✅ Música "${track.name}" carregada com sucesso!`);
      } else {
        alert(`❌ Erro: ${result.error}`);
      }
    });

    // Armazenar URL de áudio customizado para usar quando iniciar o jogo
    window.customAudioUrl = null;

    function addCustomMusicButton(track) {
      document.getElementById('customMusicSection').style.display = 'block';
      const button = document.createElement('button');
      button.className = 'music-select';
      button.style.backgroundColor = '#2196F3';
      button.textContent = `🎵 ${track.fileName}`;
      button.onclick = () => {
        // Se há audioUrl, usar esse ao invés de blank
        if (track.audioUrl) {
          window.customAudioUrl = track.audioUrl;
          setMusic(track.audioUrl, URL.createObjectURL(new Blob([track.csv])));
        } else {
          setMusic(URL.createObjectURL(new Blob([track.csv])), 'custom');
        }
      };
      document.getElementById('customMusicList').appendChild(button);
    }

    // Load metadata files for custom music
    async function loadCustomMusicFromMetadata() {
      console.log('🔄 Iniciando carregamento de músicas customizadas...');
      try {
        let metadataFiles = [];

        // First, try to load from custom_music_index.json
        try {
          console.log('Tentando carregar custom_music_index.json...');
          const response = await fetch('custom_music_index.json');
          console.log(`Response status: ${response.status}`);
          if (response.ok) {
            metadataFiles = await response.json();
            console.log(`✅ Carregou custom_music_index.json com ${metadataFiles.length} músicas`);
          }
        } catch (e) {
          console.log('❌ custom_music_index.json não encontrado:', e.message);
        }

        // Fallback: try common naming patterns
        if (metadataFiles.length === 0) {
          const baseNames = [
            'choro_fado',
            'aqui_oh', 'minha_musica',
            'um_tom_pra_jobim',
            'sanfona_carioca',
            'song', 'music', 'track', 'custom', 'upload', 'new_song',
            'musica1', 'musica2', 'musica3', 'musica4',
          ];

          for (const baseName of baseNames) {
            try {
              const response = await fetch(`${baseName}_metadata.json`);
              if (response.ok) {
                const metadata = await response.json();
                if (!metadataFiles.some(m => m.id === metadata.id)) {
                  metadataFiles.push(metadata);
                }
              }
            } catch (e) {
              // Continue
            }
          }
        }

        // Load metadata files found
        if (metadataFiles.length > 0) {
          document.getElementById('customMusicSection').style.display = 'block';

          for (const metadata of metadataFiles) {
            try {
              const response = await fetch(metadata.audio);
              if (response.ok) {
                const button = document.createElement('button');
                button.className = 'music-select';
                button.style.backgroundColor = '#FF9800';
                button.textContent = `🎵 ${metadata.name} (${metadata.tempo.toFixed(0)} BPM)`;
                button.onclick = () => {
                  setMusic(metadata.audio, metadata.csv);
                  window.currentMusicMetadata = metadata;
                };
                document.getElementById('customMusicList').appendChild(button);
              }
            } catch (e) {
              console.log(`Could not load ${metadata.name}`);
            }
          }
        }
      } catch (e) {
        console.log('No custom music metadata found');
      }
    }

    // Load existing custom music on startup
    (async () => {
      console.log('🎵 Iniciando carregamento de músicas...');

      // Check for manually added custom music buttons
      const choroFadoBtn = document.getElementById('choro_fado_btn');
      if (choroFadoBtn) {
        console.log('Verificando choro_fado.mp3...');
        try {
          const response = await fetch('choro_fado.mp3');
          if (response.ok) {
            console.log('✅ choro_fado.mp3 encontrado!');
            choroFadoBtn.style.display = 'block';
            choroFadoBtn.onclick = () => {
              setMusic('choro_fado.mp3', 'choro_fado_layers.csv');
            };
          }
        } catch (e) {
          console.log('❌ choro_fado.mp3 não encontrado');
        }
      }

      // Load from metadata files first
      await loadCustomMusicFromMetadata();

      // Also try legacy IndexedDB method
      if (typeof uploadProcessor !== 'undefined') {
        try {
          const customMusics = await uploadProcessor.getCustomMusics();
          if (customMusics.length > 0) {
            document.getElementById('customMusicSection').style.display = 'block';
            customMusics.forEach(track => addCustomMusicButton(track));
          }
        } catch (e) {
          console.log('No legacy custom music found');
        }
      }
    })();
  </script>

</body>
</html>
