<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">
  <meta name="description" content="Apps - Ivan Moriá Borges">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d2b2b">
  <title>Apps - Ivan Moriá Borges</title>
  <link rel="icon" href="https://img.icons8.com/?size=100&id=30660&format=png&color=000000" type="image/x-icon">
  <link rel="apple-touch-icon" href="https://img.icons8.com/?size=100&id=30660&format=png&color=000000">
  <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Poiret+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: white; color: #333; }

    body, html {
      overflow: hidden;
      background: #2d2b2b;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0; display: block;
    }
    #canvas-container {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* ── Settings (theme + language) ─── */
    .settings-row {
      margin-top: 18px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.13);
      width: 100%; display: flex; flex-direction: column;
      gap: 10px;
    }
    .theme-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center;
    }
    .theme-label {
      font-family: 'Poiret One', cursive;
      font-size: 12px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
    }

    /* Planet button — nebula theme toggle */
    .planet-button {
      border: none; background: none; cursor: pointer;
      padding: 4px;
      transition: transform 0.3s ease;
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
      position: relative;
      pointer-events: auto !important;
    }
    .planet-button:hover { transform: scale(1.15); }
    .planet-button:active { transform: scale(0.95); }

    .theme-switch { display: flex; direction: rtl; }
    #theme-checkbox { display: none; }
    #theme-checkbox + label {
      font-size: 1.7rem; height: 1em; width: 2.5em;
      border-radius: 0.25em; cursor: pointer;
      display: flex; justify-content: space-between;
      background: rgba(200,200,200,0.30); position: relative;
      transition: background 0.3s;
    }
    #theme-checkbox:checked + label { background: rgba(58,58,58,0.7); }
    #theme-checkbox + label:active  { transform: scale(1.4); transition: transform 0.15s; }
    #theme-checkbox + label div {
      width: 0.8em; height: 0.8em; border-radius: inherit;
      position: absolute; top: 0.1em; left: 0.1em; z-index: 10;
      transition: 0.45s cubic-bezier(1,0.33,0.11,1.34); background: #f0f0f0;
    }
    #theme-checkbox:checked + label div { left: 1.6em; background: #212121; }
    #theme-checkbox + label span { display: flex; }
    #theme-checkbox + label svg { height: 1em; width: 1em; padding: 0.14em; box-sizing: border-box; }
    #theme-checkbox + label span:first-of-type { color: #444; }
    #theme-checkbox + label span:last-of-type  { color: #ccc; }

    /* ── Language toggle ─── */
    .language-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .lang-label {
      font-family: 'Poiret One', cursive;
      font-size: 11px; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
    }
    .lang-flags {
      display: flex; gap: 4px;
    }
    .lang-flag {
      font-size: 18px; border: none; background: none; cursor: pointer;
      padding: 2px 4px; border-radius: 4px;
      transition: transform 0.2s ease, background 0.2s ease;
      opacity: 0.6;
    }
    .lang-flag:hover { transform: scale(1.15); opacity: 1; }
    .lang-flag.active { opacity: 1; background: rgba(255,255,255,0.1); }

    /* ── Nav buttons — center ─── */
    .link-list {
      position: fixed; top: 35%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    }

    .link-btn {
      color: white;
      font-family: 'Poiret One', cursive;
      font-size: clamp(18px, 4vw, 25px);
      font-weight: 600; letter-spacing: 0.04em;
      border: none; background: none;
      padding: 8px 12px; cursor: pointer;
      transition: all 0.25s ease;
      display: block;
    }
    .link-btn::after, .link-btn::before {
      content: ''; width: 0; height: 2px;
      background: #ffffff; display: block; transition: width 0.45s ease;
    }
    .link-btn::before { margin-left: auto; }
    .link-btn:hover::after, .link-btn:hover::before { width: 100%; }
    .link-btn:hover { background: white; color: black; }
    .link-btn:hover::after, .link-btn:hover::before { background: #000; }

    /* ── Signature ─── */
    .signature-wrap {
      position: fixed; left: 50%;
      transform: translateX(-50%); z-index: 1000; white-space: nowrap;
    }
    .signature-wrap.signature-top {
      top: 20px;
    }
    .signature-wrap.signature-bottom {
      bottom: 20px;
    }
    .signature {
      font-family: "Rock Salt", cursive;
      font-size: clamp(13px, 3.5vw, 18px);
      color: rgba(255,255,255,0.84);
      white-space: nowrap; overflow: hidden;
      cursor: help;
      animation: typing 3.5s steps(20,end) forwards;
    }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink  { 50% { border-color: rgba(255,255,255,0.7); } }

    /* Social row — horizontal layout for signature */
    .social-row {
      display: flex; gap: 12px; justify-content: center; align-items: center;
      margin-bottom: 8px;
    }

    @media (max-height: 560px) {
      .link-btn { font-size: 16px; padding: 5px 10px; }
      .signature-wrap { bottom: 8px; }
    }
    @media (max-width: 400px) {
      .social-btn { width: 36px; height: 36px; border-width: 1.5px; }
      .social-row { gap: 8px; }
    }

    /* ── Apps Grid/Cards ─── */
    .apps-container {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex; flex-direction: column; gap: 20px;
      align-items: center; justify-content: center;
      max-width: 90vw; width: 100%;
      max-height: 70vh; overflow-y: auto;
      padding: 20px;
    }

    .app-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      width: 100%; max-width: 420px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
      animation: shiftBg 20s linear infinite;
    }

    @keyframes shiftBg {
      0% { transform: translate(0, 0); }
      100% { transform: translate(20px, 20px); }
    }

    .app-card-content {
      position: relative; z-index: 2;
    }

    .app-icon {
      font-size: 48px; margin-bottom: 12px;
      display: inline-block;
      filter: drop-shadow(0 0 8px rgba(255, 200, 255, 0.3));
    }

    .app-title {
      font-family: 'Poiret One', cursive;
      font-size: clamp(20px, 4vw, 26px);
      color: white;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .app-desc {
      font-family: 'Poiret One', cursive;
      font-size: clamp(13px, 2.5vw, 15px);
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .app-btn {
      font-family: 'Poiret One', cursive;
      font-size: 14px;
      color: white;
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.3), rgba(150, 100, 255, 0.3));
      border: 1px solid rgba(150, 200, 255, 0.5);
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .app-btn:hover {
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.6), rgba(150, 100, 255, 0.6));
      border-color: rgba(200, 255, 255, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(100, 200, 255, 0.2);
    }

    .app-card:hover {
      border-color: rgba(150, 200, 255, 0.4);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 8px 32px rgba(100, 200, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-4px);
    }

    /* Light theme adjustments */
    body.light-theme .app-card {
      background: rgba(0, 0, 0, 0.05);
      border-color: rgba(0, 0, 0, 0.1);
    }

    body.light-theme .app-card:hover {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(100, 150, 200, 0.3);
      box-shadow: 0 8px 32px rgba(100, 150, 200, 0.1);
    }

    body.light-theme .app-title,
    body.light-theme .link-btn,
    body.light-theme span[style*="Poiret One"] {
      color: black !important;
    }

    body.light-theme .app-desc {
      color: rgba(0, 0, 0, 0.7) !important;
    }

    body.light-theme .app-btn {
      color: black;
      background: linear-gradient(135deg, rgba(100, 180, 255, 0.2), rgba(150, 100, 200, 0.2));
      border-color: rgba(100, 150, 200, 0.5);
    }

    body.light-theme .app-btn:hover {
      background: linear-gradient(135deg, rgba(100, 180, 255, 0.4), rgba(150, 100, 200, 0.4));
      border-color: rgba(100, 150, 200, 0.8);
    }

    body.light-theme .social-btn svg {
      filter: invert(1);
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <!-- Signature — bottom -->
  <div class="signature-wrap signature-bottom">
    <!-- Social icons — horizontal row -->
    <div class="social-row">
      <button class="social-btn" title="Email" onclick="window.location.href='mailto:ivanmoriabr@gmail.com'">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" fill="#fff">
          <path d="M20,4H4C2.9,4,2.01,4.9,2.01,6L2,18c0,1.1.9,2,2,2h16c1.1,0,2-.9,2-2V6C22,4.9,21.1,4,20,4zm0,2-8,5L4,6h16zM4,18V8l8,5,8-5v10H4z"/>

          <path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zM4.943 13.394V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"/>

        </svg>
      </button>
    </div>
    <div class="signature" id="assinatura">Ivan Moriá Borges</div>
  </div>

  <!-- Theme toggle — top center -->
  <div class="signature-wrap signature-top" style="display: flex; align-items: center; gap: 10px;">
    <button id="planet-toggle-top" class="planet-button" title="Click to toggle theme">
      <svg viewBox="0 0 80 80" width="40" height="40" xmlns="http://www.w3.org/2000/svg" class="planet-svg">
        <defs>
          <radialGradient id="nebulaGradient" cx="35%" cy="35%">
            <stop offset="0%" style="stop-color:#ff99ff;stop-opacity:1" />
            <stop offset="30%" style="stop-color:#dd55ff;stop-opacity:0.85" />
            <stop offset="60%" style="stop-color:#5588ff;stop-opacity:0.6" />
            <stop offset="100%" style="stop-color:#1155ff;stop-opacity:0" />
          </radialGradient>
          <radialGradient id="nebulaGradient2" cx="50%" cy="50%">
            <stop offset="0%" style="stop-color:#ff77ff;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#3366ff;stop-opacity:0" />
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
            </feMerge>
          </filter>
          <style>
            @keyframes moonOrbit {
              from { transform: rotate(0deg); }
              to { transform: rotate(360deg); }
            }
            @keyframes nebulaPulse {
              0%, 100% { opacity: 0.7; }
              50% { opacity: 1; }
            }
            @keyframes nebulaSpin {
              from { transform: rotate(0deg); }
              to { transform: rotate(-180deg); }
            }
            .moon-container {
              animation: moonOrbit 6s linear infinite;
              transform-origin: 40px 40px;
            }
            .nebula-core {
              animation: nebulaPulse 3s ease-in-out infinite;
            }
            .nebula-ring {
              animation: nebulaSpin 8s linear infinite;
              transform-origin: 40px 40px;
            }
          </style>
        </defs>
        <circle cx="40" cy="40" r="32" fill="none" stroke="url(#nebulaGradient2)" stroke-width="6" filter="url(#glow)" opacity="0.5"/>
        <circle cx="40" cy="40" r="26" fill="url(#nebulaGradient)" class="nebula-core" filter="url(#glow)"/>
        <ellipse cx="40" cy="35" rx="22" ry="18" fill="none" stroke="#dd77ff" stroke-width="1.5" opacity="0.4" class="nebula-ring" filter="url(#glow2)"/>
        <ellipse cx="40" cy="45" rx="20" ry="20" fill="none" stroke="#6699ff" stroke-width="1" opacity="0.3" class="nebula-ring" filter="url(#glow2)"/>
        <g class="moon-container">
          <defs>
            <radialGradient id="moonGlow">
              <stop offset="0%" style="stop-color:#ffff88;stop-opacity:1" />
              <stop offset="70%" style="stop-color:#ffdd44;stop-opacity:0.8" />
              <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:0" />
            </radialGradient>
          </defs>
          <circle cx="40" cy="10" r="6" fill="url(#moonGlow)" opacity="1" filter="url(#glow)"/>
          <circle cx="40" cy="10" r="4" fill="#ffffcc" opacity="0.95" filter="url(#glow)"/>
          <circle cx="40" cy="10" r="2" fill="#ffffff" opacity="0.8"/>
        </g>
      </svg>
    </button>
    <span style="font-family: 'Poiret One', cursive; font-size: clamp(16px, 3vw, 20px); color: white; font-weight: 600; letter-spacing: 0.04em;">Tema</span>
  </div>

  <!-- Back button — top left -->
  <div style="position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 1000;">
    <button class="link-btn" onclick="window.location.href='index.html'" style="font-size: 32px; padding: 4px 8px;">←</button>
  </div>

  <!-- Apps Grid -->
  <div class="apps-container">
    <!-- App 1: Generator -->
    <div class="app-card">
      <div class="app-card-content">
        <div class="app-icon">🎵</div>

        <div class="app-desc" data-pt="Crie sequências musicais e ritmos únicos com inteligência artificial" data-en="Create musical sequences and unique rhythms with AI" data-de="Erstellen Sie musikalische Sequenzen und einzigartige Rhythmen mit KI" data-fr="Créez des séquences musicales et des rythmes uniques avec l'IA" data-ja="AIで音楽シーケンスとユニークなリズムを作成" data-tr="AI ile müzik dizileri ve benzersiz ritimleri oluşturun">Crie sequências musicais e ritmos únicos com inteligência artificial</div>
        <button class="app-btn" onclick="window.open('https://ivanmoria.github.io/generator/', '_blank')">Acessar →</button>
      </div>
    </div>

    <!-- App 2: Harmonic Lab -->
    <div class="app-card">
      <div class="app-card-content">
        <div class="app-icon">🎼</div>
        <div class="app-title" data-pt="Harmonic Lab" data-en="Harmonic Lab" data-de="Harmonisches Labor" data-fr="Labo d'Harmonique" data-ja="ハーモニック・ラボ" data-tr="Harmonik Laboratuvarı">Harmonic Lab</div>
        <div class="app-desc" data-pt="Explore acordes, progressões e harmonia musical de forma interativa" data-en="Explore chords, progressions and musical harmony interactively" data-de="Erkunden Sie Akkorde, Progressionen und musikalische Harmonie interaktiv" data-fr="Explorez les accords, les progressions et l'harmonie musicale de manière interactive" data-ja="コード、進行、音楽和声をインタラクティブに探索" data-tr="Akorları, ilerlemeleri ve müzik uyumunu etkileşimli olarak keşfedin">Explore acordes, progressões e harmonia musical de forma interativa</div>
        <button class="app-btn" onclick="window.open('https://ivanmoria.github.io/asap/chords/', '_blank')">Acessar →</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="script.js"></script>
</body>
