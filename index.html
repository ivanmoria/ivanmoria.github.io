  <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Poiret+One&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: white; color: #333; }

    body, html {
      overflow: hidden;
      background: #2d2b2b;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0; display: block;
    }
    #canvas-container {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }

    /* ── Settings (theme + language) ─── */
    .settings-row {
      margin-top: 18px; padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.13);
      width: 100%; display: flex; flex-direction: column;
      gap: 10px;
    }
    .theme-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center;
    }
    .theme-label {
      font-family: 'Poiret One', cursive;
      font-size: 12px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
    }
    .theme-switch { display: flex; direction: rtl; }
    #theme-checkbox { display: none; }
    #theme-checkbox + label {
      font-size: 1.7rem; height: 1em; width: 2.5em;
      border-radius: 0.25em; cursor: pointer;
      display: flex; justify-content: space-between;
      background: rgba(200,200,200,0.30); position: relative;
      transition: background 0.3s;
    }
    #theme-checkbox:checked + label { background: rgba(58,58,58,0.7); }
    #theme-checkbox + label:active  { transform: scale(1.4); transition: transform 0.15s; }
    #theme-checkbox + label div {
      width: 0.8em; height: 0.8em; border-radius: inherit;
      position: absolute; top: 0.1em; left: 0.1em; z-index: 10;
      transition: 0.45s cubic-bezier(1,0.33,0.11,1.34); background: #f0f0f0;
    }
    #theme-checkbox:checked + label div { left: 1.6em; background: #212121; }
    #theme-checkbox + label span { display: flex; }
    #theme-checkbox + label svg { height: 1em; width: 1em; padding: 0.14em; box-sizing: border-box; }
    #theme-checkbox + label span:first-of-type { color: #444; }
    #theme-checkbox + label span:last-of-type  { color: #ccc; }

    /* ── Language toggle ─── */
    .language-row {
      display: flex; align-items: center; gap: 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .lang-label {
      font-family: 'Poiret One', cursive;
      font-size: 11px; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
    }
    .lang-flags {
      display: flex; gap: 4px;
    }
    .lang-flag {
      font-size: 18px; border: none; background: none; cursor: pointer;
      padding: 2px 4px; border-radius: 4px;
      transition: transform 0.2s ease, background 0.2s ease;
      opacity: 0.6;
    }
    .lang-flag:hover { transform: scale(1.15); opacity: 1; }
    .lang-flag.active { opacity: 1; background: rgba(255,255,255,0.1); }

    /* ── Nav buttons — center ─── */
    .link-list {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex; flex-direction: column; align-items: center;
    }

    .link-btn {
      color: white;
      font-family: 'Poiret One', cursive;
      font-size: clamp(18px, 4vw, 25px);
      font-weight: 600; letter-spacing: 0.04em;
      border: none; background: none;
      padding: 8px 12px; cursor: pointer;
      transition: all 0.25s ease;
      display: block;
    }
    .link-btn::after, .link-btn::before {
      content: ''; width: 0; height: 2px;
      background: #ffffff; display: block; transition: width 0.45s ease;
    }
    .link-btn::before { margin-left: auto; }
    .link-btn:hover::after, .link-btn:hover::before { width: 100%; }
    .link-btn:hover { background: white; color: black; }
    .link-btn:hover::after, .link-btn:hover::before { background: #000; }

    /* ── Social icons with labels — two columns ─── */
    .social-grid {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 18px;
      min-width: 200px;
    }
    .social-grid-large {
      gap: 10px;
      margin-top: 20px;
    }
    .social-item {
      display: flex; align-items: center; gap: 12px;
    }
    .social-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.45s ease, background 0.22s ease;
      flex-shrink: 0;
    }
    .social-btn:hover { background: white; transform: rotate(360deg) scale(1.12); }
    .social-btn:hover svg { filter: invert(100%) sepia(0%) saturate(0%); }
    .social-label {
      font-family: 'Poiret One', cursive;
      font-size: clamp(11px, 2vw, 13px);
      color: rgba(255,255,255,0.7);
      transition: color 0.25s ease;
    }
    .social-item:hover .social-label {
      color: white;
    }
    .social-btn-lg {
      width: 48px; height: 48px;
    }

    /* ── Signature ─── */
    .signature-wrap {
      position: fixed; left: 50%;
      transform: translateX(-50%); z-index: 1000; white-space: nowrap;
    }
    .signature-wrap.signature-top {
      top: 20px;
    }
    .signature {
      font-family: "Rock Salt", cursive;
      font-size: clamp(13px, 3.5vw, 18px);
      color: rgba(255,255,255,0.84);
      white-space: nowrap; overflow: hidden;
      cursor: help;
      animation: typing 3.5s steps(20,end) forwards;
    }
    @keyframes typing { from { width: 0; } to { width: 100%; } }
    @keyframes blink  { 50% { border-color: rgba(255,255,255,0.7); } }

    @media (max-height: 560px) {
      .link-btn { font-size: 16px; padding: 5px 10px; }
      .signature-wrap { bottom: 8px; }
    }
    @media (max-width: 400px) {
      .social-btn { width: 36px; height: 36px; border-width: 1.5px; }
      .social-row { gap: 8px; }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

  <script>
    // ── Interaction locks ─────────────────────────────────────────────
    document.body.style.overflow = 'hidden';
    window.onbeforeunload = null;
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('copy',        e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (['ArrowUp','ArrowDown','PageUp','PageDown','Home','End',' '].includes(e.key))
        e.preventDefault();
    });
    document.addEventListener('wheel', e => e.preventDefault(), { passive: false });
    document.documentElement.style.overflow = 'hidden';
    (function () {
      let prevent = false;
      document.addEventListener('touchstart', e => {
        if (e.touches.length !== 1) return;
        prevent = (window.pageYOffset || document.body.scrollTop) === 0;
      });
      document.addEventListener('touchmove', e => {
        if (prevent) { prevent = false; e.preventDefault(); }
      });
    })();

    // ── p5.js — COMBINED animation ───────────────────────────────────
    //
    // Two rendering schemes layered on the same 6 trails:
    //
    // LAYER A — HSB colored (second rewrite):
    //   Each trail has a distinct hue (red, amber, cyan, blue, green, violet).
    //   Rendered with a wide glow pass + a thin crisp pass per trail.
    //   Gives each trail a visible color identity.
    //
    // LAYER B — grayscale + warm overlay (first rewrite / second sketch):
    //   All trails share the same rendering:
    //     · pass 1 — grayscale gradient, brighter toward the head
    //     · pass 2 — stroke(val, 22, 187, alpha): warm orange → neutral blue
    //   Gives a unified warm atmosphere tying the trails together.
    //
    // Both layers rendered per frame → the colors from A show through B.

    const NUM      = 100;
    const BASE_RNG = 3;

    const TRAILS = [
      { x: [], y: [], sf: 0.12, hue:   0 },  // fast   — red
      { x: [], y: [], sf: 0.05, hue:  55 },  // slow   — amber
      { x: [], y: [], sf: 0.09, hue: 175 },  // medium — cyan
      { x: [], y: [], sf: 0.04, hue: 220 },  // v.slow — blue
      { x: [], y: [], sf: 0.11, hue: 110 },  // fast   — green
      { x: [], y: [], sf: 0.07, hue: 280 },  // medium — violet
    ];

    // Ambient trails — follow mouse with 360° spread, different speeds + hues
    const AMBIENT = [
      { x: [], y: [], sf: 0.03, hue:  20 },  // very slow — warm orange
      { x: [], y: [], sf: 0.08, hue: 140 },  // medium    — teal
      { x: [], y: [], sf: 0.13, hue: 200 },  // fast      — sky blue
      { x: [], y: [], sf: 0.06, hue: 320 },  // slow      — pink-violet
      { x: [], y: [], sf: 0.10, hue:  80 },  // med-fast  — yellow-green
      { x: [], y: [], sf: 0.04, hue: 350 },  // very slow — crimson
    ];

    // ── Flow field ───────────────────────────────────────────────────
    const FF_N     = 140;
    const ff       = [];      // particles driven by Perlin noise vectors

    // ── Constellation ────────────────────────────────────────────────
    const CONN_DIST = 130;    // max px distance to draw a connection line
    const nodes     = [];     // drifting nodes

    // ── Background layers ────────────────────────────────────────────
    const STARS     = [];   // twinkling background stars
    const NEBULAS   = [];   // slow drifting colour clouds
    const NOVA      = [];   // stardust burst particles (click)
    const ASTEROIDS = [];   // occasional passing asteroids
    let gravCx = 0, gravCy = 0;  // smoothed orbit centre (lags behind mouse)

// Max constellation nodes based on screen size
    function maxNodes() {
      if (windowWidth <= 480)  return 25;   // small mobile
      if (windowWidth <= 900)  return 45;   // tablet / large mobile
      return 80;                            // desktop
    }

    let isDarkMode = true;
    let explosion  = false;
    let exStr      = 8;
    let pmx = 0, pmy = 0;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('canvas-container');
      frameRate(60);
      // Assign evenly spaced angles (0–360°) across all 12 trails,
      // and initialise each one at its angle position so they start spread out
      const ALL = [...TRAILS, ...AMBIENT];
      ALL.forEach((t, k) => {
        t.ang = (TWO_PI * k) / ALL.length;
        t.ns  = k * 127;   // unique Perlin noise seed per trail
        t.x   = Array(NUM).fill(width  / 2 + cos(t.ang) * 80);
        t.y   = Array(NUM).fill(height / 2 + sin(t.ang) * 80);
      });
      // Twinkling stars
      for (let i = 0; i < 130; i++)
        STARS.push({ x: random(width), y: random(height), r: random(0.4, 1.8), phase: random(TWO_PI) });
      // Nebula clouds
      for (let i = 0; i < 5; i++)
        NEBULAS.push({ x: random(width), y: random(height),
                       w: random(220, 480), h: random(100, 260),
                       hue: random(360), vx: random(-0.08, 0.08), vy: random(-0.05, 0.05) });
      // Scatter flow-field particles
      for (let i = 0; i < FF_N; i++)
        ff.push({ x: random(width), y: random(height), spd: random(1.2, 2.5) });
      // Scatter initial nodes up to the screen-size limit
      const initN = min(55, maxNodes());
      for (let i = 0; i < initN; i++)
        nodes.push({ x: random(width), y: random(height),
                     vx: random(-0.35, 0.35), vy: random(-0.35, 0.35),
                     r: random(1.5, 3), glow: 0,
                     rep: random(28, 72), wx: random(1000), wy: random(2000),
                     z: 0, vz: 0 });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      [...TRAILS, ...AMBIENT].forEach(t => {
        t.x = Array(NUM).fill(width  / 2 + cos(t.ang) * 80);
        t.y = Array(NUM).fill(height / 2 + sin(t.ang) * 80);
      });
      ff.length = 0;
      for (let i = 0; i < FF_N; i++)
        ff.push({ x: random(width), y: random(height), spd: random(1.2, 2.5) });
      nodes.length = 0;
      for (let i = 0; i < 55; i++)
        nodes.push({ x: random(width), y: random(height),
                     vx: random(-0.35, 0.35), vy: random(-0.35, 0.35),
                     r: random(1.5, 3), glow: 0,
                     rep: random(28, 72), wx: random(1000), wy: random(2000),
                     z: 0, vz: 0 });
      ASTEROIDS.length = 0;
      STARS.length = 0;
      for (let i = 0; i < 130; i++)
        STARS.push({ x: random(width), y: random(height), r: random(0.4, 1.8), phase: random(TWO_PI) });
      NEBULAS.length = 0;
      for (let i = 0; i < 5; i++)
        NEBULAS.push({ x: random(width), y: random(height),
                       w: random(220, 480), h: random(100, 260),
                       hue: random(360), vx: random(-0.08, 0.08), vy: random(-0.05, 0.05) });
    }

    function draw() {
      const vx  = mouseX - pmx, vy = mouseY - pmy;
      const spd = sqrt(vx * vx + vy * vy);
      pmx = mouseX; pmy = mouseY;
      const rng = map(spd, 0, 28, BASE_RNG, BASE_RNG * 2.8, true);

      background(isDarkMode ? 45 : 203);

      // Smoothed orbit centre — lags behind mouse so fast swipe naturally throws asteroids
      if (gravCx === 0) { gravCx = mouseX || width * 0.5; gravCy = mouseY || height * 0.5; }
      gravCx = lerp(gravCx, mouseX, 0.08);
      gravCy = lerp(gravCy, mouseY, 0.08);

      // Hue shift driven by mouse position:
      // Y axis → 0–270° (dominant), X axis → 0–90° (fine-tune) = full 360° range
      // timeDrift: colours evolve slowly even when mouse is idle
      const hueShift = map(mouseY, 0, height, 0, 270) + map(mouseX, 0, width, 0, 90) + frameCount * 0.06;

      colorMode(HSB, 360, 100, 100, 255);

      // ── STARS — twinkling background dots ─────────────────────────
      noStroke();
      for (const s of STARS) {
        const a = map(sin(frameCount * 0.04 + s.phase), -1, 1,
                      isDarkMode ? 25 : 15, isDarkMode ? 180 : 130);
        fill((hueShift + 40) % 360, 25, 100, a);
        circle(s.x, s.y, s.r * 2);
      }

      // ── ASTEROID SPAWN — from screen edges, orbit around gravity centre ──────
      if (frameCount % 180 === 0 && ASTEROIDS.length < 10 && random() < 0.90) {
        const r = random(140, 320), ecc = random(0.02, 0.42), inc = random(TWO_PI);
        const ph = random(TWO_PI), sa = r, sb = sa * (1 - ecc);
        const sz = random(2.5, 5.5), pts = floor(random(5, 9));
        const verts = Array.from({length: pts}, () => random(0.5, 1.0));
        // Spawn from edge, not center
        const edge = floor(random(4));
        let sx, sy;
        if (edge === 0) { sx = random(width * 0.1, width * 0.9); sy = -40; }           // top
        else if (edge === 1) { sx = width + 40; sy = random(height * 0.1, height * 0.9); }  // right
        else if (edge === 2) { sx = random(width * 0.1, width * 0.9); sy = height + 40; }  // bottom
        else { sx = -40; sy = random(height * 0.1, height * 0.9); }                    // left
        const lonely = random() < 0.35;  // 35% pass far without mouse interaction
        ASTEROIDS.push({
          x: sx, y: sy,
          sa, sb, inc, phase: ph,
          rot: random(TWO_PI), rotSpd: random(-0.014, 0.014),
          size: sz, curSize: sz, alpha: random(110, 170),
          fiery: false, pts, verts, trail: [],
          mode: 'orbital', vx: 0, vy: 0,
          life: floor(random(1200, 2400)),
          activated: false,
          lonely: lonely,
          explosionDelay: floor(random(140, 460)),
          restTime: 0
        });
      }
      // Update asteroid orbits (around gravity centre, same as trails)
      for (let k = ASTEROIDS.length - 1; k >= 0; k--) {
        const a = ASTEROIDS[k];
        a.rot += a.rotSpd;
        a.life--;
        if (a.life <= 0) { ASTEROIDS.splice(k, 1); continue; }

        if (a.mode === 'orbital') {
          const md = dist(gravCx, gravCy, a.x, a.y);

          // Fast mouse movement: occasionally knock asteroids out of orbit (rare)
          if (spd > 32 && md < 280 && random() < 0.03) {
            a.mode = 'free';
            a.fiery = false;
            const dx = a.x - gravCx, dy = a.y - gravCy;
            const d = sqrt(dx*dx + dy*dy) + 1;
            // Gentle drift velocity, no mouse momentum
            a.vx = (dx / d) * random(2.5, 4.2);
            a.vy = (dy / d) * random(2.5, 4.2);
          }

          if (a.activated) {
            // Spiral into centre while on fire
            a.sa = lerp(a.sa, 12, 0.058);
            a.sb = a.sa * 0.35;
            a.fiery = true;

            // Launch when very close
            const md = dist(gravCx, gravCy, a.x, a.y);
            if (a.sa < 18 && md < 90) {
              a.mode = 'free';
              const dx = a.x - gravCx, dy = a.y - gravCy;
              const d = sqrt(dx*dx + dy*dy) + 1;
              a.vx = (dx / d) * random(9.5, 13.5);
              a.vy = (dy / d) * random(9.5, 13.5);
            }
          }

          // Kepler orbit around gravity centre (follows trails)
          a.phase += 0.52 / pow(max(a.sa, 25), 0.72);
          const lx = a.sa * cos(a.phase), ly = a.sb * sin(a.phase);
          const ox = gravCx + lx * cos(a.inc) - ly * sin(a.inc);
          const oy = gravCy + lx * sin(a.inc) + ly * cos(a.inc);

          if (!a.activated) {
            // Only orbit if not lonely — lonely ones just drift freely
            if (!a.lonely) {
              a.x = lerp(a.x, ox, 0.04);
              a.y = lerp(a.y, oy, 0.04);
            }
          } else {
            // Activated: strong gravitational pull toward center (not orbiting)
            const mdx = gravCx - a.x, mdy = gravCy - a.y;
            const md = sqrt(mdx*mdx + mdy*mdy);
            if (md > 1) {
              a.vx += (mdx / md) * 0.14;
              a.vy += (mdy / md) * 0.14;
            }
            a.vx *= 0.95;
            a.vy *= 0.95;
            a.x += a.vx;
            a.y += a.vy;

            // Ignite when close enough
            if (md < 140) {
              a.fiery = true;
            }

            // Launch when very close and burning
            if (a.fiery && md < 90) {
              a.mode = 'free';
              const dx = a.x - gravCx, dy = a.y - gravCy;
              const d = sqrt(dx*dx + dy*dy) + 1;
              a.vx = (dx / d) * random(9.5, 13.5);
              a.vy = (dy / d) * random(9.5, 13.5);
            }
          }
        } else {
          // Free-flight: gravity pull if user chases, or continue out
          const mdx = gravCx - a.x, mdy = gravCy - a.y;
          const md = sqrt(mdx*mdx + mdy*mdy);

          if (!a.fiery) {
            // Non-burning: continue moving out, but can be pulled back if chased
            if (md < 380) {
              // Light pull if user chases
              a.vx += mdx * 0.00006;
              a.vy += mdy * 0.00006;
            }
            a.vx *= 0.996;
            a.vy *= 0.996;
          } else {
            // Burning asteroids: stronger pull if chased
            if (md < 350) {
              a.vx += mdx * 0.00018;
              a.vy += mdy * 0.00018;
            }
            a.vx *= 0.94;
            a.vy *= 0.94;
          }

          a.x += a.vx;
          a.y += a.vy;

          // If nearly stopped and fiery, start resting
          if (a.fiery && spd < 0.5 && a.restTime === 0) {
            a.restTime = floor(random(180, 380));  // rest 3-6 seconds
          }

          // Exit screen (non-burning asteroids leave immediately)
          if (!a.fiery && (a.x < -200 || a.x > width + 200 || a.y < -200 || a.y > height + 200)) {
            ASTEROIDS.splice(k, 1);
            continue;
          }

          // Burning asteroids: disintegrate, emit limited dust, then become stars
          if (a.fiery) {
            if (!a.dustCount) a.dustCount = 0;

            // Emit dust until reaching 20 particles
            if (a.dustCount < 20 && frameCount % 12 === 0 && random() < 0.35) {
              const dustAng = random(TWO_PI);
              const dustDist = random(a.curSize * 0.4, a.curSize * 1.5);
              ff.push({
                x: a.x + cos(dustAng) * dustDist,
                y: a.y + sin(dustAng) * dustDist,
                spd: random(0.35, 0.75),
                phase: random(TWO_PI),
                orbitCx: a.x,
                orbitCy: a.y,
                orbitR: dustDist * random(0.9, 1.2),
                isCosmicDust: true,
                explosionBurst: 0,
                lifespan: floor(random(380, 580))
              });
              a.dustCount++;
            }

            // Shrink faster and emit dust simultaneously (more interactive)
            a.curSize = lerp(a.curSize, a.curSize * 0.88, 0.022);

            // After emitting dust, transform into a star (quicker)
            if (a.dustCount >= 20 && a.curSize < 0.6) {
              nodes.push({
                x: a.x, y: a.y, vx: 0, vy: 0, z: 0, vz: 0,
                r: random(1.6, 2.5), glow: 0.4,
                rep: random(28, 72), wx: random(1000), wy: random(2000)
              });
              ASTEROIDS.splice(k, 1);
              continue;
            }
          }

        }

        const md = dist(gravCx, gravCy, a.x, a.y);
        a.curSize = lerp(a.curSize,
          a.size * map(md, 0, 160, 2.0, 1.0, true), 0.07);

        a.trail.push({x: a.x, y: a.y});
        if (a.trail.length > 28) a.trail.shift();
      }

      // Maintain flow field population - create new poeira if not clicking and count is low
      if (!mouseIsPressed && frameCount % 22 === 0 && ff.length < 180) {
        ff.push({
          x: random(width * 0.2, width * 0.8),
          y: random(height * 0.2, height * 0.8),
          spd: random(0.5, 1.0),
          orbitDist: random(80, 200)  // individual orbit distance
        });
      }

      // ── FLOW FIELD — Perlin noise + cosmic dust orbital patterns ────
      {
        const ns = 0.0035, nt = frameCount * 0.004;
        strokeWeight(1.3); noFill();
        for (let i = ff.length - 1; i >= 0; i--) {
          const p = ff[i];
          let nx, ny;
          if (p.isCosmicDust) {
            // Cosmic dust: countdown to transformation into constellation star
            p.lifespan--;

            // Fast burst initially, then orbital decay
            if (p.explosionBurst > 0) {
              p.explosionBurst--;
              p.orbitR = p.orbitR * (1 + p.spd * 0.086);
            } else {
              p.phase += p.spd * 0.014;
              p.orbitR = lerp(p.orbitR, p.orbitR * 1.004, 0.006);
            }
            nx = p.orbitCx + cos(p.phase) * p.orbitR;
            ny = p.orbitCy + sin(p.phase) * p.orbitR;

            // Transform into new constellation star when lifespan expires
            if (p.lifespan <= 0) {
              nodes.push({
                x: nx, y: ny, vx: 0, vy: 0, z: 0, vz: 0,
                r: random(1.5, 2.8), glow: 0.6,
                rep: random(28, 72), wx: random(1000), wy: random(2000),
                solitude: 0,
                maxSolitude: floor(random(800, 1400))
              });
              ff.splice(i, 1);
              continue;
            }

            // Remove when very dispersed (backup)
            if (p.orbitR > 360) { ff.splice(i, 1); continue; }

            // Cosmic dust: render as glowing points
            const fadeF = p.lifespan < 80 ? p.lifespan / 80 : 1;
            noStroke();
            if (isDarkMode) {
              fill(24, 78, 92, 160 * fadeF);
              circle(nx, ny, 1.2);
              fill(35, 95, 110, 90 * fadeF);
              circle(nx, ny, 2.8);
            } else {
              fill(255, 50, 150, 150 * fadeF);  // vibrant magenta for light mode
              circle(nx, ny, 1.2);
              fill(255, 100, 180, 110 * fadeF);  // bright magenta halo
              circle(nx, ny, 2.8);
            }
            p.x = nx;
            p.y = ny;
          } else {
            // Normal flow field: free movement, vortex when clicking
            const angle = noise(p.x * ns, p.y * ns, nt) * TWO_PI * 2;
            nx = p.x + cos(angle) * p.spd;
            ny = p.y + sin(angle) * p.spd;

            if (mouseIsPressed) {
              // When clicking: slow fluid convergence to mouse point
              const mdx = mouseX - nx, mdy = mouseY - ny;
              const md = sqrt(mdx*mdx + mdy*mdy);

              if (md > 3) {
                // Very gentle, slow pull toward mouse
                nx += mdx * 0.05;
                ny += mdy * 0.05;
              }
            }
            // When not clicking: just flow field, no attraction

            stroke((hueShift + 30) % 360, 60, isDarkMode ? 90 : 60, isDarkMode ? 80 : 85);
            line(p.x, p.y, nx, ny);
            p.x = nx;
            p.y = ny;
          }
        }
      }

      // ── CONSTELLATION — proximity-connected drifting nodes ────────
      // Nodes drift slowly; mouse attracts near ones; lines between close pairs
      {
        const cHue = (hueShift + 120) % 360;
        // Update positions
        // 1 — mouse attraction (passive hover)
        for (const n of nodes) {
          const md = dist(mouseX, mouseY, n.x, n.y);
          if (md < 200) { n.vx += (mouseX - n.x) * 0.0005; n.vy += (mouseY - n.y) * 0.0005; }
        }
        // Vortex — true 3D rotation around mouse (pitch + yaw + roll simultaneously)
        if (mouseIsPressed) {
          const ax = 0.018, ay = 0.022, az = 0.014;
          for (const n of nodes) {
            if (dist(mouseX, mouseY, n.x, n.y) > 200) continue; // only nearby stars
            const dx = n.x - mouseX, dy = n.y - mouseY, dz = n.z;
            // Pitch: rotate around X axis
            const y1 =  dy * cos(ax) - dz * sin(ax);
            const z1 =  dy * sin(ax) + dz * cos(ax);
            // Yaw: rotate around Y axis
            const x2 =  dx * cos(ay) + z1 * sin(ay);
            const z2 = -dx * sin(ay) + z1 * cos(ay);
            // Roll: rotate around Z axis
            const x3 =  x2 * cos(az) - y1 * sin(az);
            const y3 =  x2 * sin(az) + y1 * cos(az);
            n.x = mouseX + x3;
            n.y = mouseY + y3;
            n.z = z2;
          }
        }
        // 2 — node repulsion (per-node personal space → varied constellation shapes)
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[j].x - nodes[i].x;
            const dy = nodes[j].y - nodes[i].y;
            const d   = sqrt(dx * dx + dy * dy);
            const REP = (nodes[i].rep + nodes[j].rep) * 0.5;
            if (d < REP && d > 0) {
              const f = (REP - d) / REP * 0.3;
              nodes[i].vx -= dx / d * f;  nodes[i].vy -= dy / d * f;
              nodes[j].vx += dx / d * f;  nodes[j].vy += dy / d * f;
            }
          }
        }
        // 3 — noise wander + damping + speed cap + move + solitude fade
        for (let n_idx = nodes.length - 1; n_idx >= 0; n_idx--) {
          const n = nodes[n_idx];
          // Perlin wander — each node drifts differently, breaks triangle lock-in
          n.vx += (noise(n.wx, frameCount * 0.004) * 2 - 1) * 0.045;
          n.vy += (noise(n.wy, frameCount * 0.004) * 2 - 1) * 0.045;
          n.vx *= 0.97; n.vy *= 0.97;
          n.vz = n.vz * 0.92;
          n.z  = constrain(n.z + n.vz, -280, 280);
          const spd = sqrt(n.vx * n.vx + n.vy * n.vy);
          if (spd > 3) { n.vx = n.vx / spd * 3; n.vy = n.vy / spd * 3; }
          n.x += n.vx;  n.y += n.vy;
          if (n.x < 0 || n.x > width)  n.vx *= -1;
          if (n.y < 0 || n.y > height) n.vy *= -1;

          // Solitude counter: isolated stars fade away
          if (n.maxSolitude !== undefined) {
            n.solitude++;
            // If isolated for too long, remove
            if (n.solitude > n.maxSolitude) {
              nodes.splice(n_idx, 1);
            }
          }
        }
        // Node–node connections — two brightness tiers:
        //   d < CONN_DIST*0.4  → formed constellation (bright)
        //   d < CONN_DIST      → still approaching (dim)
        const FORMED = CONN_DIST * 0.4;
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const d = dist(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
            if (d >= CONN_DIST) continue;
            if (nodes[i].glow > 0 || nodes[j].glow > 0) continue;
            if (d < FORMED) {
              strokeWeight(1.4);
              stroke(cHue, 75, isDarkMode ? 100 : 75,
                     map(d, 0, FORMED, isDarkMode ? 240 : 190, isDarkMode ? 140 : 110));
            } else {
              strokeWeight(0.5);
              stroke(cHue, 50, isDarkMode ? 80 : 55,
                     map(d, FORMED, CONN_DIST, isDarkMode ? 70 : 50, 0));
            }
            line(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
          }
        }
        // Mouse–node connections
        strokeWeight(0.7);
        for (const n of nodes) {
          const d = dist(mouseX, mouseY, n.x, n.y);
          if (d < CONN_DIST * 1.5) {
            stroke(cHue, 65, isDarkMode ? 92 : 65,
                   map(d, 0, CONN_DIST * 1.5, isDarkMode ? 130 : 95, 0));
            line(mouseX, mouseY, n.x, n.y);
          }
        }
        // Dots — z depth only affects size (closer = bigger)
        noStroke();
        for (const n of nodes) {
          const zs = max(0.2, 600 / (600 + n.z));
          if (n.glow > 0) {
            n.glow = max(0, n.glow - 0.04);
            fill(cHue, 25, 100, n.glow * 255);
            circle(n.x, n.y, n.r * 2 * (1 + n.glow * 1.5) * zs);
            fill(cHue, 40, 100, n.glow * 70);
            circle(n.x, n.y, n.r * 7 * n.glow * zs);
          } else {
            let a = map(dist(mouseX, mouseY, n.x, n.y), 0, 260,
                        isDarkMode ? 200 : 155, isDarkMode ? 65 : 40, true);
            // Fade out if isolated and lonely
            if (n.maxSolitude !== undefined) {
              const fadeRatio = 1 - (n.solitude / n.maxSolitude);
              a = a * max(0, fadeRatio);
            }
            fill(cHue, 55, isDarkMode ? 90 : 62, a);
            circle(n.x, n.y, n.r * 2 * zs);
          }
        }
      }

      strokeWeight(1); noFill();

      // Each trail targets its own orbit point around the mouse:
      // evenly spaced 30° apart (12 trails) + slow global rotation
      // Holding mouse → large fast-spinning orbit (trail lines form a vortex)
      // Released → small slow breathing orbit (normal follow)
      const ORBIT_R = mouseIsPressed
        ? 45 + sin(frameCount * 0.09) * 18   // vortex: 27–63 px, fast pulse
        : 6  + sin(frameCount * 0.022) * 5;  // normal: 1–11 px
      const rot = mouseIsPressed
        ? frameCount * 0.055  // ~1.9 s per full spin
        : frameCount * 0.005; // ~20 s per full spin

      for (const t of TRAILS) {
        for (let i = 1; i < NUM; i++) { t.x[i-1] = t.x[i]; t.y[i-1] = t.y[i]; }
        const tx = mouseX + cos(t.ang + rot) * ORBIT_R;
        const ty = mouseY + sin(t.ang + rot) * ORBIT_R;
        t.x[NUM-1] += (noise(t.ns,      frameCount * 0.01) * 2 - 1) * rng + (tx - t.x[NUM-1]) * t.sf;
        t.y[NUM-1] += (noise(t.ns + 50, frameCount * 0.01) * 2 - 1) * rng + (ty - t.y[NUM-1]) * t.sf;
        t.x[NUM-1]  = constrain(t.x[NUM-1], 0, width);
        t.y[NUM-1]  = constrain(t.y[NUM-1], 0, height);
      }

      for (const a of AMBIENT) {
        for (let i = 1; i < NUM; i++) { a.x[i-1] = a.x[i]; a.y[i-1] = a.y[i]; }
        const tx = mouseX + cos(a.ang + rot) * ORBIT_R;
        const ty = mouseY + sin(a.ang + rot) * ORBIT_R;
        a.x[NUM-1] += (noise(a.ns,      frameCount * 0.01) * 2 - 1) * rng + (tx - a.x[NUM-1]) * a.sf;
        a.y[NUM-1] += (noise(a.ns + 50, frameCount * 0.01) * 2 - 1) * rng + (ty - a.y[NUM-1]) * a.sf;
        a.x[NUM-1]  = constrain(a.x[NUM-1], 0, width);
        a.y[NUM-1]  = constrain(a.y[NUM-1], 0, height);
      }

      // ── LAYER A: HSB per-trail color (glow + crisp) ──────────────
      colorMode(HSB, 360, 100, 100, 255);
      const sat = isDarkMode ? 68 : 85;  // more saturated in light mode
      const bri = isDarkMode ? 96 : 75;  // brighter in light mode

      for (const t of TRAILS) {
        // A1 — glow: wide stroke, very transparent
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          strokeWeight(lerp(1.5, 0.3, tt));
          stroke((t.hue + hueShift) % 360, sat, bri, tt * 7);
          line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
        }
        // A2 — crisp: thin stroke, fades in toward head
        strokeWeight(1);
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          stroke((t.hue + hueShift) % 360, sat - 14, bri, tt * 38);
          line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
        }
      }

      // A3 — ambient trails: identical rendering to TRAILS
      for (const a of AMBIENT) {
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          strokeWeight(lerp(2.5, 0.4, tt));
          stroke((a.hue + hueShift) % 360, sat, bri, tt * 16);
          line(a.x[i-1], a.y[i-1], a.x[i], a.y[i]);
        }
        strokeWeight(1);
        for (let i = 1; i < NUM; i++) {
          const tt = i / NUM;
          stroke((a.hue + hueShift) % 360, sat - 14, bri, tt * 38);
          line(a.x[i-1], a.y[i-1], a.x[i], a.y[i]);
        }
      }

      // ── LAYER B: grayscale + warm overlay (applied to all trails) ─
      colorMode(RGB, 255);

      // Layer B applied equally to all 12 trails
      const ALL = [...TRAILS, ...AMBIENT];

      // B0 — soft glow (wide, very transparent warm overlay)
      strokeWeight(5);
      for (let i = 1; i < NUM; i++) {
        const val   = (i / NUM) * 200 + 32;
        const alpha = min((i + 4) * 0.22, 12);
        stroke(isDarkMode ? val       : val * 0.55,
               isDarkMode ? 22        : 20,
               isDarkMode ? 187       : 140,
               alpha);
        for (const t of ALL) line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
      }

      // B1 — grayscale gradient
      strokeWeight(1);
      for (let i = 1; i < NUM; i++) {
        const val = (i / NUM) * 100 + 3;
        stroke(isDarkMode ? val + 110 : val, 30);
        for (const t of ALL) line(t.x[i-1], t.y[i-1], t.x[i], t.y[i]);
      }

      // B2 — colorful warm overlay: stroke(val, 22, 187, alpha)
      for (let j = 1; j < NUM; j++) {
        const val   = (j / NUM) * 200 + 32;
        const alpha = min(2 * (j + 4), 65);
        stroke(isDarkMode ? val       : val * 0.55,
               isDarkMode ? 22        : 20,
               isDarkMode ? 187       : 140,
               isDarkMode ? alpha     : alpha * 0.55);
        for (const t of ALL) line(t.x[j-1], t.y[j-1], t.x[j], t.y[j]);
      }

      // ── ASTEROID RENDERING — RGB, natural rocky colours ───────────
      // Drawn last so nothing overwrites them; colour mode already RGB here
      for (const a of ASTEROIDS) {
        const fadeF = a.life < 90 ? a.life / 90 : 1;
        const al    = a.alpha * fadeF;

        // Faint ecliptic ellipse (orbital mode only)
        if (a.mode === 'orbital') {
          noFill();
          strokeWeight(0.5);
          stroke(a.fiery ? 200 : 185, a.fiery ? 80 : 178, a.fiery ? 30 : 168,
                 al * (isDarkMode ? 0.14 : 0.09));
          push();
            translate(gravCx, gravCy);
            rotate(a.inc);
            ellipse(0, 0, a.sa * 2, a.sb * 2);
          pop();
        }

        // Trail
        noStroke();
        for (let t = 0; t < a.trail.length; t++) {
          const tt = t / a.trail.length;
          if (a.fiery) {
            fill(210, 78, 28, al * tt * 0.38);
          } else {
            if (isDarkMode) {
              fill(165, 158, 148, al * tt * 0.24);
            } else {
              fill(0, 200, 220, al * tt * 0.28);  // bright cyan trail for light mode
            }
          }
          circle(a.trail[t].x, a.trail[t].y, a.curSize * tt * 0.6);
        }

        // Body
        if (a.mode === 'orbital' || a.mode === 'free') {
          push();
            translate(a.x, a.y);
            rotate(a.rot);
            if (a.fiery) {
              // Outer ember glow
              fill(230, 110, 35, al * 0.25);
              beginShape();
              for (let v = 0; v < a.pts; v++) {
                const ang = TWO_PI * v / a.pts;
                vertex(cos(ang)*a.curSize*a.verts[v]*1.85, sin(ang)*a.curSize*a.verts[v]*1.85);
              }
              endShape(CLOSE);
              fill(195, 62, 18, al);
            } else {
              if (isDarkMode) {
                fill(155, 150, 140, al);
              } else {
                fill(0, 200, 220, al);  // bright cyan for light mode
              }
            }
            beginShape();
            for (let v = 0; v < a.pts; v++) {
              const ang = TWO_PI * v / a.pts;
              vertex(cos(ang)*a.curSize*a.verts[v], sin(ang)*a.curSize*a.verts[v]);
            }
            endShape(CLOSE);
          pop();
        }
      }

      if (explosion) explodeLines();
    }

    function explodeLines() {
      for (const t of TRAILS) {
        for (let i = 0; i < NUM; i++) {
          const a = atan2(t.y[i] - mouseY, t.x[i] - mouseX);
          t.x[i] += cos(a) * exStr;
          t.y[i] += sin(a) * exStr;
        }
      }
      // Ambient trails also react to explosion, but softer
      for (const a of AMBIENT) {
        for (let i = 0; i < NUM; i++) {
          const ang = atan2(a.y[i] - mouseY, a.x[i] - mouseX);
          a.x[i] += cos(ang) * exStr * 0.55;
          a.y[i] += sin(ang) * exStr * 0.55;
        }
      }
      if (frameCount % 10 === 0) exStr *= 0.88;
      if (exStr < 0.1) { explosion = false; exStr = 8; }
    }

    function mousePressed() {
      // Each click plants a new bright star — respect screen-size limit
      if (nodes.length >= maxNodes()) return;
      nodes.push({
        x: random(width), y: random(height),
        vx: random(-0.3, 0.3), vy: random(-0.3, 0.3),
        r: random(2, 3.5), glow: 1.0,
        rep: random(28, 72), wx: random(1000), wy: random(2000),
        z: 0, vz: 0
      });
      explosion = true; exStr = 8;
      // Z scatter on nearby constellation nodes
      for (const n of nodes) {
        if (dist(mouseX, mouseY, n.x, n.y) < 320) n.vz += random(-7, 7);
      }
      // Check if any asteroid is already burning
      const hasBurning = ASTEROIDS.some(a => a.fiery);

      // Activate asteroids to spiral into center or transform to stars
      for (let k = ASTEROIDS.length - 1; k >= 0; k--) {
        const a = ASTEROIDS[k];
        if (a.mode !== 'orbital') continue;
        const d = dist(mouseX, mouseY, a.x, a.y);
        if (d < 240) {
          // All nearby asteroids respond to click
          a.lonely = false;  // stop being lonely when interacted with

          if (hasBurning) {
            // If one is already burning, turn others into stars immediately
            nodes.push({
              x: a.x, y: a.y, vx: 0, vy: 0, z: 0, vz: 0,
              r: random(1.8, 3.2), glow: 0.6,
              rep: random(28, 72), wx: random(1000), wy: random(2000)
            });
            ASTEROIDS.splice(k, 1);
          } else {
            // Some asteroids transform directly into constellation stars
            if (random() < 0.45) {
              nodes.push({
                x: a.x, y: a.y, vx: 0, vy: 0, z: 0, vz: 0,
                r: random(1.8, 3.2), glow: 0.8,
                rep: random(28, 72), wx: random(1000), wy: random(2000)
              });
              ASTEROIDS.splice(k, 1);
            } else {
              // Others spiral in and burn
              a.activated = true;
            }
          }
        }
      }
    }

    document.getElementById('theme-checkbox').addEventListener('change', function () {
      isDarkMode = !isDarkMode;
    });

    // ── Language translation system ──
    let currentLanguage = 'pt';

    function setLanguage(lang) {
      currentLanguage = lang;

      // Update all elements with data-lang attributes
      document.querySelectorAll('[data-pt], [data-en], [data-de], [data-fr], [data-ja], [data-tr]').forEach(el => {
        const attr = `data-${lang}`;
        if (el.hasAttribute(attr)) {
          el.textContent = el.getAttribute(attr);
        }
      });

      // Update active language flag
      document.querySelectorAll('.lang-flag').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-lang') === lang) {
          btn.classList.add('active');
        }
      });

      // Store preference in localStorage
      localStorage.setItem('preferredLanguage', lang);
    }

    // Load saved language preference
    window.addEventListener('load', function() {
      const savedLang = localStorage.getItem('preferredLanguage') || 'pt';
      setLanguage(savedLang);
    });
  </script>

</body>
</html>
